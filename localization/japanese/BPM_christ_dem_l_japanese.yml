l_japanese:
  bpm_christian_democrats_events.1.t:0 "カトリック教会は選挙において誰の支持も控える"
  bpm_christian_democrats_events.1.d:0 "我々はこのクソみたいなものには参加しない"
  bpm_christian_democrats_events.1.f:0 "#lore 20. それゆえ、あなたの司牧的配慮に従い、この信仰を守り保つために熱心に働きなさい。この信仰の純粋性をわずかでも汚す可能性のあるものを決して容認したり見過ごしたりすることなく、すべての人々をそれによって教え、ためらう者を励まし、異議を唱える者を説得し、信仰の弱い者を強めることを決して怠ってはならない。同じ大きな精神の力をもって、すべての人々のカトリック教会との一致を育みなさい。その外には救いはない。また、我々の最も聖なる宗教の全構造が依って立つ、このペトロの座への服従も育みなさい。"
  bpm_christian_democrats_events.1.a:0 "選挙はキモい - おそらく教皇（皮肉抜きで）"