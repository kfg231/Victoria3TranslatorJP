metternich_resignation_and_flee_tt: "[SCOPE.sCharacter('metternich_scope').GetFullName]は[SCOPE.sCharacter('metternich_scope').GetHerHis]辞任を申し出る"

metternich.1.t: "一つの時代の終わり"
metternich.1.d: "[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle] [ROOT.GetCountry.GetRuler.GetFirstName]の即位に伴い、長年仕えてきた宰相[SCOPE.sCharacter('metternich_scope').GetFullName]は[SCOPE.sCharacter('metternich_scope').GetHerHis]引退を発表しました。[SCOPE.sCharacter('metternich_scope').GetHerHis]政治家としての手腕によって定義された歴史の一章は幕を閉じました。"
metternich.1.f: "「しかし、結局のところ、私が密かに抱いている考えは、古きヨーロッパが終末の始まりにあるということだ。私はそれと共に滅びる決意をしているので、自分の義務を果たす方法を知っている。これは私だけのモットーではない――皇帝のモットーでもあるのだ。一方、新たなヨーロッパは、その存在をまだ始めておらず、終わりと始まりの間には混沌があるだろう。」\n\n― クレメンス・フォン・メッテルニヒ" # Sourced from Wolfgang Siemann's Metternich: Strategist and Visionary
metternich.1.a: "偉大なる指揮者が舞台を去る。"

metternich.2.t: "不名誉な終焉"
metternich.2.d_revolution: "[ROOT.GetCountry.GetNameNoFlag]が革命の混乱に苛まれ、政府がもはや[SCOPE.sCharacter('metternich_scope').GetHerHis]安全を保証できなくなったため、[SCOPE.sCharacter('metternich_scope').GetFullName]は[SCOPE.sCharacter('metternich_scope').GetHerHis]職を辞することを余儀なくされました。[SCOPE.sCharacter('metternich_scope').GetSheHe|U]は[ROOT.GetCountry.GetCapital.GetCityHubName]から逃れ、亡命しました。"
metternich.2.d_gov_change: "[SCOPE.gsInterestGroup('aristocracy_ig').GetName]を政府から排除した結果、[SCOPE.sCharacter('metternich_scope').GetFullName]は[SCOPE.sCharacter('metternich_scope').GetHerHis]職を辞する以外に選択肢がなくなりました。[SCOPE.sCharacter('metternich_scope').GetHerHis]かつての影響力の多くを失い、[SCOPE.sCharacter('metternich_scope').GetSheHe]は[SCOPE.sCharacter('metternich_scope').GetHerHis]領地に隠遁しました。"
metternich.2.f: "「私はもはや誰でもない。もうやることも、議論することもない。」\n\n― クレメンス・フォン・メッテルニヒ"
metternich.2.a: "[SCOPE.sCharacter('metternich_scope').GetSheHe|U]が我々を定義することはもうない。"

metternich.3.t: "小さなクーデター"
metternich.3.d: "宰相[SCOPE.sCharacter('metternich_scope').GetFullName]は、$concept_geheime_staatskonferenz$の構造に関する一連の改革を提案しました。この改革は、機関の機能を改善すると同時に、[SCOPE.sCharacter('metternich_scope').GetHerselfHimself]をその疑いようのない長として据えるものです。[SCOPE.sCharacter('kolowrat_scope').GetFullName]は、この施策を阻止するために王室と連携しました。"
metternich.3.f: "「メッテルニヒ以上に、追加の権力から恩恵を受ける男性はほとんどいません」と使者は言い始めた。「そして、大公が私の言うことをお許しくださるようお願いします。月末までにお時間があれば…」\n\n大公は、苛立った表情で彼を止めるよう身振りをした。彼のブーツは半分履いた状態で、彼はそれに完全に注意を向けたいと思っていた。「月末？ コロウラトは今どこだ？」\n\n「ボヘミアでございます、閣下。彼はインフルエンザの知らせを送ってきました。」」"
metternich.3.a: "コロウラトの干渉が帝国の安定を脅かしている。"
metternich.3.b: "宰相は外交問題に限定すべきだ。"

