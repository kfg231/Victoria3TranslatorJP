notification_danubian_federation_culture_disqualified_desc: "帝国の連邦化が進む中、[SCOPE.sCountry('austria_scope').GetAdjective]政府は、[SCOPE.sCulture('relevant_culture_scope').GetName] [concept_culture]が統合から恒久的に[Concept('concept_disqualified_culture','$concept_disqualified_culture_short$')]される決定を下した。\n\n[SCOPE.sCountry('austria_scope').GetName]は、我々の[concept_liberty_desire]を#v 25#!未満に減らし、相互関係を#v 50#!以上に高めない限り、#v $je_danubian_federation$#! [concept_journal_entry]を達成できなくなる。"
