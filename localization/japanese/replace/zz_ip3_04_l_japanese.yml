labour_associations_events.1.t: "組合不在"
labour_associations_events.1.d: "[SCOPE.sLaw('current_law_scope').GetName]の下で強化される労働者団体に脅威を感じ、[SCOPE.gsInterestGroup('industrialists_ig').GetName]は組合化された労働力の危険性に関する数多くの報告書を公表した。"
labour_associations_events.1.f: "#bold 組合生活は私に向いているか？#!\n\n• 賃金から差し引かれる組合費\n• 賃金、福利厚生、労働規則に関する保証なし\n• 個人交渉の機会なし\n\n#italic あなたの会社が仕事を提供し賃金を支払う——組合は過去にも未来にも決してそうしない！#!"
labour_associations_events.1.a: "彼らは恐怖しているに違いない。"
labour_associations_events.1.b: "誰もが自らの利益を追求する権利を持つ。"

labour_associations_events.2.t: "先制ストライキ"
labour_associations_events.2.d: "政府が[SCOPE.sLaw('current_law_scope').GetName]を確立しようとする努力のニュースは労働者階級のコミュニティに急速に広まった。[SCOPE.gsInterestGroup('industrialists_ig').GetName]は、違法な組合活動の対応する増加について不満を言い始めている。"
labour_associations_events.2.f: "政府がその構想を発表した瞬間、ポスターが現れ始めた。夜警が犯人を捕まえようとする無駄な努力は実を結ばず、会社は被害の拡大防止に追い込まれた。毎晩、壁は貼り紙で覆われ——そして朝には、会社が前夜の努力をゴミ箱に詰め込んだ。\n\nちょうど次の週、ごみ収集員たちは自分たちの新しい組合を発表した。"
labour_associations_events.2.a: "これらの苦情を無視するよう裁判所に命じよ。"
labour_associations_events.2.b: "現行法は有効のままである。"

labour_associations_events.3.t: "労働組合委員会"
labour_associations_events.3.d: "労働者団体からの請願を受け、[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]は[SCOPE.sLaw('current_law_scope').GetName]に関する委員会を設置した。委員会は政府に2つの報告書を提出した——[SCOPE.gsInterestGroup('opposed_ig').GetName]によって書かれた多数派報告書と、[SCOPE.gsInterestGroup('unions_ig').GetName]に同情的な少数派報告書である。"
labour_associations_events.3.f: "「実際のところ、現状の法律は一方的で不当なものである。労働者がその目的を推進するためのほぼすべての結社は取引制限の陰謀と見なされ、したがって刑事罰の対象となった一方で、雇用主によるまったく同様の行為は、陰謀の罪を伴わないとして法律の注意を逃れたからだ。しかし実際には、何千人もの労働者を雇う雇用主は、それ自体が一つの結社であった。」" #- Henry Bruce, on the 1871 Trade Unions Act
labour_associations_events.3.a: "少数派報告書を採用せよ。"
labour_associations_events.3.b: "多数派報告書の方が説得力がある。"

labour_associations_events.4.t: "衰退する産業"
labour_associations_events.4.d: "政府の[GetLawType('law_guild_system').GetName]への攻撃は、生計が脅かされていると感じる人々の間で暴動を引き起こした。[SCOPE.sState('relevant_state').GetName]では、暴動を起こした職人と熟練労働者が機械を破壊し、請負業者を脅迫している。"
labour_associations_events.4.f: "飢餓状態で私たちが請願した\n神への呪いを、それは無駄だった；\n私たちは無駄に望み、無駄に待った、\n彼はただ私たちの悲しい運命をあざ笑い嘲った——\n私たちは織っている、織っているのだ！" #- Die armen Weber, Heinrich Heine
labour_associations_events.4.a: "自由に競争できないなら、別の仕事を見つければよい。"
labour_associations_events.4.b: "財産を守るため軍隊を投入せよ。"

labour_associations_events.5.t: "最後の抵抗"
labour_associations_events.5.d: "政府が[SCOPE.sLaw('current_law_scope').GetName]を制定しようとする努力は、[SCOPE.gsInterestGroup('trade_unions_ig').GetName]からのほぼ全面的な反対に直面している。組合指導部は、政府に譲歩させるためにゼネストを呼びかけている。"
labour_associations_events.5.f: "組合員たちは大挙して集まっていた。[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]から1マイル以内のすべての街灯柱は赤い吹き流しで飾られ、徒歩での移動は絶望的な努力だった。数人の政府議員は、人の波に立ち向かうより、オフィスで寝ることを選んだ。他の者たち、野党の急進派は、それに加わることを選んだ。彼らは建物をぐるりと取り囲む警察官の列によって帰路を断たれていた。\n\n今や双方は包囲状態と見なしていた。デモ参加者は自分たちの間でパンと水を配るために実に印象的な物流システムを構築し、一方で議員たちは[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]の食堂とワインセラーを利用した。\n\n「あとどれくらい？」と若手議員が尋ねた。彼の同僚はもはや答えるエネルギーを振り絞れなかった。"
labour_associations_events.5.a: "彼らの反応がこの法案を正当化する。"
labour_associations_events.5.b: "交渉を申し出よ。"
labour_associations_events.5.c: "彼らの通信手段を遮断せよ。"

labour_associations_events.6.t: "耐え難い紛争"
labour_associations_events.6.d: "産業労働者が日常的にさらされている恐ろしい状況を詳述した本が一夜にして成功を収めた。この本の成功は[SCOPE.sLaw('current_law_scope').GetName]への国民の関心を高め、[SCOPE.gsInterestGroup('industrialists_ig').GetName]の面目を失わせている。"
labour_associations_events.6.f: "「このように社会秩序は、労働者にとって家族生活をほとんど不可能にする。快適さもなく不潔な家、単なる夜間の避難所にやっと足りる程度で、家具も乏しく、雨漏りがしたり暖かくないことも多く、人間であふれかえった部屋に満ちる汚れた空気の下では、家庭の安らぎなどありえない。夫は一日中働き、おそらく妻も年長の子供たちも、それぞれ別の場所で働いている。彼らは夜と朝にしか会わず、皆が絶え間ない酒の誘惑にさらされている。そんな状況下でどんな家族生活が可能だろうか？」" #- Friedrich Engels, The Condition of the Working Class in England
labour_associations_events.6.a: "労働者は自らを主張できるべきだ。"
labour_associations_events.6.b: "我々は所有者をこれ以上動揺させてはならない。"

labour_associations_events.7.t: "法の条文"
labour_associations_events.7.d: "組織化された労働に対する政府の転換に勢いづき、[SCOPE.gsInterestGroup('relevant_bourgeois_ig').GetName]は自らの工場内で労働組合を先制的に取り締まり始めた。[SCOPE.gsInterestGroup('unions_ig').GetName]は、古い法律がまだ有効な間に、対応を要求している。"
labour_associations_events.7.f: "それはばかげていた。書記官も、彼の上司たちも、そして彼の前に立つ組合代表もおそらくそれを知っていた。判事に到達する前に法律の書物から消えてしまうような法律に依存した土壇場の請願。\n\nそれでも、それは完璧だった。それを即座に却下することを許すような明らかな誤りが何もなかった。彼の唯一の選択肢は、それを誰か他の人の受信箱に詰まらせることだった。彼の口元は楽しみのない微笑みへと引き締まった。\n\n「ありがとうございます、ご主人。省から郵便でご連絡いたします。」"
labour_associations_events.7.a: "彼らはもはや何の立場も持たない。"
labour_associations_events.7.b: "我々は現行の立法を維持しなければならない。"

labour_associations_events.8.t: "労働の自由市場"
labour_associations_events.8.d: "政府が[GetLawType('law_guild_system').GetName]を解体する措置を講じるにつれ、勢いづいた[GetPopType('laborers').GetName]と[GetPopType('machinists').GetName]は、以前は排除されていた分野に進出し始めている。"
labour_associations_events.8.f: "「俺、行くよ。前に言おうと思ってたんだ。[SCOPE.sState('relevant_state').GetCityHubName]の工場で仕事を見つけた。輸送費と寝床のためのローンを申し出てくれて…」\n\n彼は言葉を途切れさせ、順番に友人の顔を見た。\n\n「ありがとう。全部ありがとう。手紙を書くよ、誰かに書いてもらうよ。本当に…本当に良かった。またいつか会おう。約束する。」"
labour_associations_events.8.a: "我々の努力は十分に報われている。"
labour_associations_events.8.b: "自由への大いなる勝利。"

labour_associations_events.9.t: "隠された動機"
labour_associations_events.9.d: "都市の経済的ライバルを不利にする機会を感じて、[SCOPE.gsInterestGroup('landowners_ig').GetName]の著名なメンバーが[SCOPE.sLaw('current_law_scope').GetName]の制定を支持する姿勢を示している。"
labour_associations_events.9.f: "「組合は混乱の代理人だ——しかし、肝心なのは、彼らが最大の敵意を我々の直接の競争相手に向けることだ。彼らは上司に譲歩を要求し、その譲歩は[SCOPE.sState('relevant_state').GetCityHubName]の大富豪たちの懐を深くえぐる。この損失を補うため、彼らは価格を上げざるを得なくなり、我々の製品を非常に有利な立場に置くことになる。」\n\n「では、我々自身の民衆はどうか？ 農民組合を恐れる必要があるか？」\n\n「彼らは清浄な空気を吸い、首筋に太陽を感じることができる。多くの者が自分の土地を持っている。彼らに組合が必要なのか？」」"
labour_associations_events.9.a: "「完全に実行可能な取り決めだ。」"
labour_associations_events.9.b: "「このような申し出には警戒しなければならない。」"

