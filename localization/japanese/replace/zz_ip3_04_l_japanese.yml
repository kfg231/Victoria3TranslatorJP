austria_trialism.1.t: "[SCOPE.sCountry('austria_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('austria_scope').GetRuler.GetFirstName]が三元主義宣言を発する"
austria_trialism.1.d: "[SCOPE.sCountry('austria_scope').GetCapital.GetCityHubName]の[SCOPE.sCountry('austria_scope').GetRuler.GetPrimaryRoleTitle]が、[GetCulture('croat').GetName]王国の設立を支持する宣言を発した。この王国を設立することは、[ROOT.GetCountry.GetAdjectiveNoFlag]王室領の一体性を損ない、帝国内での我々の相対的地位を低下させることになる。"
austria_trialism.1.f: "使者が議会議長のドアを激しく叩き、秘書が現れるまで止まらなかった。彼は片手に書類の束を握りしめ、もう一方の手をドア枠に置いてバランスを取っていた。息を切らしながら、ようやく最初の言葉を発した。\n\n「今知らせを受けました。[SCOPE.sCountry('austria_scope').GetRuler.GetCustom('getEmpressEmperor')]が——」\n\n「[SCOPE.sCountry('austria_scope').GetRuler.GetCustom('getQueenKing')]のことでございますか？」\n\n「ああ、そうです。[SCOPE.sCountry('austria_scope').GetRuler.GetCustom('getQueenKing')]は我々を解体しようとしています。」"
austria_trialism.1.a: "[ROOT.GetCountry.GetNameNoFlag]へのこの侮辱に拒否権を行使する。"
austria_trialism.1.b: "我々の過ちが報われるように。宣言に署名する。"
possible_dp_with_austria_scope_tt: "#r#b [SCOPE.sCountry('austria_scope').GetName]に対する[concept_diplomatic_play]を引き起こす可能性あり#!#!"

austria_trialism.2.t: "[SCOPE.sCountry('hungary_scope').GetName]が三元主義宣言を拒否"
austria_trialism.2.d: "[SCOPE.sCountry('hungary_scope').GetName]政府は、[GetCulture('croat').GetName]民族に対等な君主国を約束する[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]の宣言に拒否権を行使した。[SCOPE.sCountry('hungary_scope').GetNameNoFormatting]の拒否は、帝国両地域の南スラブ系住民の間に不満を引き起こした。"
austria_trialism.2.f: "大きなため息が[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]を包んだ。彼らに楽観的な理由はなかった——しかし、どういうわけか、それはとても近いものに思えた。一瞬、彼らは希望を持つことを許したが、それは確固たる修正を迫られるだけだった。\n\nもちろん解決策はあったが、その瞬間、誰も口に出す勇気のないものだった。夕方になり、彼らの思考が幻滅から復讐へと向かった時、初めてそのようなことが表現できた。[SCOPE.sCountry('hungary_scope').GetNameNoFormatting]には拒否権があるが、[ROOT.GetCountry.GetNameNoFormatting]には重砲がある。彼らは再び希望を抱く勇気があるだろうか？"
austria_trialism.2.a: "我々は合理的にできることは全て行った。"
austria_trialism.2.b: "その条件を強制するため軍隊を動員する。"

austria_trialism.3.t: "三重王国"
austria_trialism.3.d_peace: "[SCOPE.sCountry('hungary_scope').GetName]による[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]の宣言批准により、帝国の[GetCulture('croat').GetName]地域から対等な[SCOPE.sCountry('croatia_scope').GetName]王国が組織された。二重君主国は三重君主国となった。"
austria_trialism.3.d_war: "[SCOPE.sCountry('hungary_scope').GetName]が軍事力によって屈服させられたことにより、帝国の[GetCulture('croat').GetName]地域から対等な[SCOPE.sCountry('croatia_scope').GetName]王国が組織された。二重君主国は三重君主国となった。"
austria_trialism.3.f: "「新聞が宣言の言葉を捉えた時」と官吏は語り始めた。「[SCOPE.sCountry('croatia_scope').GetCapital.GetCityHubName]では二つのパレードがありました。一つは二重君主国の終焉を祝うため、もう一つは三重君主国の到来を告げるためです。どんなメッセージよりも明確だと思います。」\n\n「あなたは最初のパレードに居合わせたと言いました。制御不能になることを心配したことはありませんか？」\n\n「考えましたよ、認めざるを得ません。そんなことは悲しいほどよくあることです。しかし彼らはハンガリー人を指弾できました。彼らの抑圧者となる代わりに、我々は自らを彼らの英雄にしたのです。」"
austria_trialism.3.a: "[SCOPE.sCountry('croatia_scope').GetNameNoFlag]を歴史的な[GetCulture('croat').GetName]の土地に限定する。"
austria_trialism.3.b: "[GetCulture('slovene').GetName]の土地の一部をその管理下に置く。"
austria_trialism.3.c: "[SCOPE.sCountry('croatia_scope').GetNameNoFlag]は全ての南スラブ人のための王国とする。"

aus_hun_civil_war_warning_tt: "#r どちらも譲歩しなければ、帝国の両地域間で戦争が勃発する。#!"

