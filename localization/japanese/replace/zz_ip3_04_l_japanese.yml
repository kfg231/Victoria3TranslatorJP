galicia_formation.1.t: "第一歩"
galicia_formation.1.d: "[SCOPE.sState('west_galicia_state').GetName]と[SCOPE.sState('east_galicia_state').GetName]の再統一により、我々は単なる自由都市としての以前の地位から大きく前進しました。しかし、一つの疑問が迫っています――[ROOT.GetCountry.GetNameNoFlag]は[GetCulture('polish').GetName]統一の基盤となるのか、それともその多民族的な性格を受け入れるのか？"
galicia_formation.1.f: "[SCOPE.sState('west_galicia_state').GetCityHubName]の花火に集中すれば、キリルは考えた、東の問題をほとんど忘れることができるかもしれない。「ガリツィア」という名をかつて主張した唯一の国家は、古きハプスブルク王国――ポーランドの地主とドイツ人官僚のための器だった。ポーランドの民族主義者たちは確かに後者を置き換えるだろうが、彼らが我々の民に平等をもたらすことを信頼できるだろうか？ キリルは到着時に街をくまなく巡ったが、彼を安心させるものはほとんど見られなかった。彼らは連邦を復活させようという熱狂の中で、その欠点を忘れることにもあまりにも積極的だった。"
galicia_formation.1.a: "[ROOT.GetCountry.GetNameNoFlag]は[GetCulture('polish').GetName]であり、これからもそうあり続ける。"
galicia_formation.1.b: "[GetCulture('polish').GetCustom('getPluralDemonym')]と[GetCulture('ukrainian').GetCustom('getPluralDemonym')]は我々の統治の下で結束を見出すだろう。"
galicia_formation.1.c: "我々はもっと大きな存在になれる。"

