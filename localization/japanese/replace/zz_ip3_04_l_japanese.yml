je_standestaat_reason: "[ROOT.GetCountry.GetName]における大衆政治の台頭は、伝統的階級の間で反対運動の勃興を促した。[SelectLocalization(SCOPE.sPoliticalMovement('corporatist_movement_scope').IsValid, SCOPE.sPoliticalMovement('corporatist_movement_scope').GetName, 'movement_corporatist')]は、[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]と多党制民主主義を廃止し、[GetLawType('law_organic_democracy').GetName]、すなわち「シュテンデシュタート」を支持する。\n\nこの[concept_journal_entry]が有効な間、[GetIdeology('ideology_corporatist_leader').GetName]の[concept_character]が出現する確率が上昇する。"
