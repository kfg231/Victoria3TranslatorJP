notification_danubian_federation_culture_angered_primary_desc: "帝国の連邦化が進む中、[SCOPE.sCountry('austria_scope').GetAdjective]政府は[SCOPE.sCulture('relevant_culture_scope').GetName]の人々の間で不満を引き起こす決定を下した。\n\n我々の[concept_liberty_desire]はそれに応じて増加し、[SCOPE.sCountry('austria_scope').GetName]との[concept_relations]は悪化した。"
