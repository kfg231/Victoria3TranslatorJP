je_red_summer: "「赤い[SCOPE.GetRootScope.GetCountry.GetCustom('country_red_season_name')]」"
je_red_summer_reason: "「#b $je_springtime_of_the_peoples$#!の革命の高まりにより、[ROOT.GetCountry.GetName]に新しい自由主義政府が権力を掌握した。しかし、権力を得ることと、それを維持することは同じではない。自由主義政府は、新しい議会秩序を廃止しようとする#b 保守勢力#!と、さらに包括的な第二の革命を脅かす#b 急進派#!の両方から脅威にさらされている。\n\n#b 反動#!\n自由主義政府がその支配を確固たるものにするまで、旧秩序の復讐心に燃える残党から脅威にさらされる。#b 反動の進展#!が#v 100#!に達すると、革命政府は#b 権力から追放#!され、保守的な秩序が再確立される。」"
if_failed_through_counter_revolution_tt: "「#b 反動の進展#!が#v 100#!に達した場合：」"
if_failed_through_civil_war_tt: "「[concept_civil_war]が勃発した場合：」"

liberals_in_government_tt: "「#tooltippable;tooltip:[GetPlayer.GetTooltipTag],red_summer_liberal_ideologies_list_tt 革命的な#! [Concept('concept_politician', '$concept_politicians$')]が現在[concept_in_government]」"
liberals_out_of_government_tt: "「@warning! #b 反動#!が#r 急速に進展#!する可能性がある。#tooltippable;tooltip:[GetPlayer.GetTooltipTag],red_summer_liberal_ideologies_list_tt 革命的な#! [Concept('concept_politician', '$concept_politicians$')]は#bold 現在[concept_in_government]ではない#!。」"

peoples_springtime.9.t: "「[SCOPE.sCountry('relevant_country').GetAdjectiveNoFormatting]革命」"
peoples_springtime.9.d: "「ヨーロッパ中に広がる革命の波に触発され、[SCOPE.sState('relevant_state').GetCityHubName]の革命家たちが[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]に要求を突きつけるために集結した。彼らは[GetLawType('law_universal_suffrage').GetName]、民主的な憲法、そして[GetLawType('law_national_guard').GetName]の設立を要求している。」"
peoples_springtime.9.f: "「群衆は今や[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]の住居に向かって溢れんばかりで、石のような表情をした兵士たちの薄い壁によってのみ押しとどめられていた。侮辱と路上の瓦礫が銃剣と大砲の列に向かって飛び、馬の尾を激しく揺らした。商業地区では、行進に加わらないことを選んだ小売店主たちが店の戸を板で閉ざしていた。即席の戦列のさらに後方では、労働者たちが街門を打ち破るために街灯柱を引き抜いていた。壊れた配管が通りに不気味な半ば明かりを投げかけていた。」"
peoples_springtime.9.a: "「内戦のリスクは冒せない。」"
peoples_springtime.9.b: "「選挙権で妥協し、これを成し遂げよ。」"
peoples_springtime.9.c: "「直ちに軍隊を投入せよ。」"

had_springtime_revolution_tt: "「[ROOT.GetCountry.GetNameNoFlag]は民主的な憲法を制定することを余儀なくされた」"

peoples_springtime.10.t: "「赤い[SCOPE.GetRootScope.GetCountry.GetCustom('country_red_season_name_dynamic')]」"
peoples_springtime.10.d: "「ヨーロッパでの革命の高まりにより、[ROOT.GetCountry.GetName]に自由主義政府が権力を掌握した。この脆弱な自由主義秩序は、その成果を覆そうとする保守勢力と、新たな革命を脅かす急進派の両方から脅威にさらされている。」"
peoples_springtime.10.f:1 "「私は首都で、仕事がなく飢えに苦しみながらも、空虚な理論と夢想に満ちた希望で頭がいっぱいの、連隊を組んだ武装労働者十万人を見出した。私は社会が二つに分断されているのを見た：何も持たない者たちは共通の貪欲さで結ばれ、何かを持つ者たちは共通の恐怖で結ばれていた。この二つの大きな階層の間には絆も共感もなかった。いたるところで、避けられず差し迫った闘争の考えが目前にあるように思われた。」\n\n—アレクシ・ド・トクヴィル、#italic 『アレクシ・ド・トクヴィルの回想録』#!」" #- Alexis de Tocqueville
peoples_springtime.10.a: "「憲法万歳！」"
peoples_springtime.10.b: "「この茶番は終わらせなければならない。」"
