eastern_question_russia.1.t: "「南スラヴの保護者」"
eastern_question_russia.1.t2: "「[SelectLocalization(SCOPE.sCountry('bulgaria_scope').IsValid, SCOPE.sCountry('bulgaria_scope').GetAdjective, 'BUL_ADJ')]復興」"
eastern_question_russia.1.d: "「[SCOPE.sCountry('bulgaria_scope').GetName]の独立への貢献は、南スラヴ諸民族の保護者としての我々の信頼性をもたらした。我々は今、バルカン半島における影響力を確固たるものにする十分な機会を得ている。」"
eastern_question_russia.1.d2: "「[SCOPE.sCountry('bulgaria_scope').GetName]の独立は、オスマン圏の亀裂を露呈させた。我々はバルカン半島における勢力圏を拡大する幸運な機会を得た。」"
eastern_question_russia.1.f: "「新しく編成された[SCOPE.sCountry('bulgaria_scope').GetAdjectiveNoFormatting]連隊が行進を開始する中、ブラスバンドの音が鳴り響いた。新しい[SCOPE.sCountry('bulgaria_scope').GetAdjectiveNoFormatting]の軍服が[SCOPE.sCharacter('name_a_scope').GetHerHis]自身のものとほとんど同じに見えるのは、なんて興味深いことか、と[SCOPE.sCharacter('name_a_scope').GetLastNameNoFormatting]は思った。青緑色の生地に赤い縁取り。子供が父親を真似るような、愛らしさがあった。\n\nしかし、彼の任務には愛らしさ以上のものが求められた。いつの日か、これらの兵士たちは彼自身の国の利益のために行進する必要があるかもしれない。[ROOT.GetCountry.GetNameNoFormatting]は[SCOPE.sCountry('bulgaria_scope').GetRuler.GetPrimaryRoleTitle]からの保証を必要とするだろう。調整すべき軍事協力があり、請求すべきオスマンの文書があった。喜びの一時間ごとに、一日分の仕事があるのだ。」"
eastern_question_russia.1.a: "「[SCOPE.sCountry('bulgaria_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('bulgaria_scope').GetRuler.GetLastName]に祝意と大使館を提供せよ。」"
eastern_question_russia.1.b: "「さらに遠方にも機会はある。」"
eastern_question_russia.1.c: "「[SCOPE.sCountry('bulgaria_scope').GetRuler.GetPrimaryRoleTitle] [SCOPE.sCountry('bulgaria_scope').GetRuler.GetLastName]に祝意と大使館を提供せよ。」"
eastern_question_russia.1.e: "「おそらく長期滞在が必要だろう。」"

