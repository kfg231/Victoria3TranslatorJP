metternich_memory_level_0: "その無能さによって、[ROOT.GetCountry.GetNameNoFormatting]の必然的な没落の種を蒔いた男。"
metternich_memory_level_1:1 "そのビジョンが触れるすべてのものを腐食させることになる、信用を失った反動の源。"
metternich_memory_level_2: "任期を大幅に過ぎても権力にしがみついた、色あせた政治家。"
metternich_memory_level_3: "過去の時代の輝きを失った巨人。その真の業績は、後の愚行によって影が薄くなった。"
metternich_memory_level_4: "旧社会の先見者。魅力的でありながらも運命づけられた理想を宿した人物。"
metternich_memory_level_5: "反動の勇敢な擁護者。等しく嫌悪され、またロマンチックに語られる人物。"
metternich_memory_level_6:1 "進歩主義者にとっての好敵手。今なお存続しうる気高い貴族制の象徴。"
metternich_memory_level_7: "近代性に対する偉大な懐疑者でありながら、その無名の設計者の一人。"
metternich_memory_level_8: "[ROOT.GetCountry.GetNameNoFormatting]がその成功を負う、戦略家かつ先見者。"
metternich_memory_level_9: "現代国家運営の模範。誰もが自分もそうありたいと夢見る人物。"
metternich_memory_level_10: "ナポレオンに匹敵する人物。あらゆる政治的潮流が自らの陣営の一人として主張する。"

