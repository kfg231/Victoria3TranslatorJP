concept_geheime_staatskonferenz: "秘密国家会議"
concept_geheime_staatskonferenz_desc: "$concept_geheime_staatskonferenz$、すなわち#b 秘密国家会議#!は、#b オーストリア帝国#!の事実上の統治機関であり、皇帝フランツ1世の意志によって設立されました。法的には、この機関は皇帝フェルディナントに対する諮問委員会として存在しています。その構成は宮廷内の自由主義派と保守派の妥協の産物であり、[SelectLocalization(GetPlayer.IsValid,'LANDOWNERS_INGAME_LINK','$ig_landowners$')]、[SelectLocalization(GetPlayer.IsValid,'INTELLIGENTSIA_INGAME_LINK','$ig_intelligentsia$')]、そして[SelectLocalization(GetPlayer.IsValid,'ARMED_FORCES_INGAME_LINK','$ig_armed_forces$')]のメンバーを含んでいます。\n\n$concept_geheime_staatskonferenz$修正は、#v $je_metternich$#! [concept_journal_entry]が有効である限り持続します。この修正が有効な間、[SelectLocalization(GetPlayer.IsValid,'LANDOWNERS_INGAME_LINK','$ig_landowners$')]、[SelectLocalization(GetPlayer.IsValid,'INTELLIGENTSIA_INGAME_LINK','$ig_intelligentsia$')]、そして[SelectLocalization(GetPlayer.IsValid,'ARMED_FORCES_INGAME_LINK','$ig_armed_forces$')]は、[concept_in_government]でない場合、[concept_approval]が大幅に減少します。\n$TOOLTIP_DELIMITER$\n[GetStaticModifier('modifier_geheime_staatskonferenz').GetDesc]"

