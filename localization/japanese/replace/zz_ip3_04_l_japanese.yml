hungry_forties.1.t: "飢えた[SCOPE.GetRootScope.GetCountry.GetCustom('getDecadeName')|U]"
hungry_forties.1.d: "[SCOPE.sState('relevant_state').GetName]で発生した作物病害が、ヨーロッパ大陸の広範囲に広がり始めている。不作が迫る中、飢饉への懸念が渦巻き始めた。"
hungry_forties.1.f: "医師は器具でジャガイモを突き、同僚が見えるように身をかがめた。器具の鈍い先端は、変色した部分に1センチメートル沈み込んでいた。\n\n「残念ながら、疫病です。畑の他の塊茎を検査しても、おそらく同じ結果になるでしょう。現状では、特別な措置を推奨します。」"
hungry_forties.1.a: "災厄だ！"
hungry_forties.1.b: "外国産穀物購入のための基金を設立する。"

hungry_forties.2.t: "平穏な時代"
hungry_forties.2.d: "「飢えた[SCOPE.GetRootScope.GetCountry.GetCustom('getDecadeName')]」を通じてヨーロッパ大陸を襲った作物病害の波は収まった。疫病に冒された畑は、影響を受けた品種のジャガイモを二度と育てられないかもしれないが、他の作物は完全に回復すると見込まれている。"
hungry_forties.2.f: "「聞いたか？新しい種類のジャガイモの種を売っているそうだ。疫病にかからないって言うんだが。」\n\n塀の向こう側にもたれかかる男は眉を上げた。「そろそろだな。遅すぎたくらいだ。冬を乗り切るために、子供たちに干し草を食べさせなきゃならなかった。」\n\n「君はまだましだ。道を下った家族は子供を失った。本当に、遅すぎたんだ。」"
hungry_forties.2.a: "ありがたい。"
hungry_forties.2.b: "本当に終わったと言えるのか？"

