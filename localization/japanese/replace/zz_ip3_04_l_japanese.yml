austria_events.40.t: "帝国を救うために"
austria_events.40.d: "[ROOT.GetCountry.GetName]における選挙権の拡大は、伝統的に保守的な[SCOPE.gsInterestGroup('armed_forces_ig').GetName]の間で鋭い反応を引き起こした。多くの[GetPopType('officers').GetName]が、[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]を帝国の安定に対する負債と見なすようになった。"
austria_events.40.f: "「政治家たちは帝国を茶番劇にしようとしている」大佐は語り始めた。「投票権の拡大は、[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]をますます手に負えないものにする。彼らは混乱と遅延を煽ることに時間を費やし、遅延した行為はすべて王冠に新たな汚点を刻む。」\n\n彼は周囲のうなずきを見た。テーブルに着いた男たちは皆、地方議会の支持を確保するという名目の予算削減を経験していた。彼は続けた。\n\n「我々の帝国は黄昏の年に入り、我々はこの廃墟の中に立っている。これが続けば——もしこれが#italic 許されれば#!——我々は皆、忘却の彼方に掃き流されることを恐れる。」"
austria_events.40.a: "彼らの言葉は独裁を脅かす。"
austria_events.40.b: "彼らが間違っていると本当に言えるのか？"

modifier_military_absolutist_bonus: "憲法より帝国"

