shelved_too_soon_ago_tt: "我々は#b最近この提案を棚上げしてはいない#!"

je_danubian_federation: "連邦的解決策"
je_danubian_federation_reason: "[ROOT.GetCountry.GetName]の無数の民族間の摩擦は、長らく帝国の統合に対する脅威であった。様々な民族の権利を擁護する者たちは、長年にわたり帝国の様々な形態の連邦化を求めてきた。近年、彼らは王朝を維持するという名目の下での急進的改革に関心を持つ[SCOPE.gsInterestGroup('armed_forces_ig').GetName]のメンバーと接触するようになった。これらの提案の中で最新のものである提案中の#b$dyn_c_usga$#!は、古い王室領を廃止し、民族の境界線に沿って描かれた一連の自治国家に置き換えるものである。\n\nこの提案は、提案された歴史的ハンガリーの分割に反対する[GetCulture('hungarian').GetName]の政治家たちや、非ドイツ人国家内で少数派となる可能性が高い[GetCulture('south_german').GetName]人口からの反対に直面している。"

austria_federation.1.t: "[SelectLocalization(SCOPE.sCharacter('relevant_character').IsValid, SCOPE.sCharacter('relevant_character').GetLastName, '連邦')]提案"
austria_federation.1.d: "民族権利の擁護者である[SCOPE.sCulture('relevant_character').GetName]の[SCOPE.sCharacter('relevant_character').GetFullName]は、帝国を多民族連邦国家へ再編成する提案を提示した。[SCOPE.sCharacter('relevant_character').GetHerHis|U]の提案は、[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]の志を同じくする関係者の間で人気を博している。"
austria_federation.1.d_mil: "[SCOPE.sCharacter('relevant_character').GetInterestGroup.GetName]内で影響力のある人物である[SCOPE.sCharacter('relevant_character').GetFullName]は、帝国を連邦化することで[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]の権威を回復する提案を提示した。[SCOPE.sCharacter('relevant_character').GetHerHis|U]の提案は、宮廷内の志を同じくするメンバーの間で人気を博している。"
austria_federation.1.f: "「この観点からすれば、それは[ROOT.GetCountry.GetNameNoFormatting]の「没落」の問題ではなく、再編成、再生の問題である。この帝国を心から気にかけるすべての人々が、暗い憧れの中にあっても、正しい前進の道を完全に自覚できさえすればよいのだ。第一に、独立した民族国家だけが存在する権利を持つというのは真実ではない。しばしば、そして正当にも引用される例である$SWI$は、混合民族的国家の典型であり、その存在権を否定しようとする合理的な者は誰もいないだろう。実際、我々の帝国において、歴史的過程は、新たに目覚めた必要性に対応する、国民と国家の関係の近代的形式を求めて、ただもがいているのである。」\n\n— アウレル・ポポヴィチ、#italic『大オーストリア合衆国』#!"
austria_federation.1.a: "これこそが[ROOT.GetCountry.GetNameNoFormatting]に必要な改革だ。"
austria_federation.1.b: "我々は今、これを管理できるとは期待できない。"
modifier_endorse_popovici_proposal: "承認された提案"
modifier_shelve_popovici_proposal: "棚上げされた提案"

austria_federation.2.t: "もう一つの道"
austria_federation.2.d: "[ROOT.GetCountry.GetName]の宣言は、国民国家という支配的なモデルに対する確固たる代替案として、非民族的連合を確立した。他者が共通の血統から正統性を引き出すところで、我々は王朝と我々の諸民族の多様性から力を引き出すだろう。"
austria_federation.2.f: "「喜びよ、神の輝く火花よ、\nエリュシオンの娘よ、\n熱狂の炎と共に、女神よ、\n我らは汝の聖域に近づく！\n汝の魔力は、厳格な慣習が\n引き離した者たちを再び結びつける。\nすべての人々は兄弟となるだろう、\n汝の守護の翼の下で。」\n\n— フリードリヒ・シラー、「歓喜に寄せて」"
austria_federation.2.a: "帝国はそのすべての民族を結びつける。"
austria_federation.2.b: "人民の皇帝に万歳を三唱せよ！"

austria_federation.3.t: "ボヘミア問題"
austria_federation.3.desc: "何百年もの間、かつてのボヘミア王冠領の土地には、[SCOPE.sCulture('czech_culture').GetName]と[GetCulture('south_german').GetName]の両人口が居住してきた。連邦内に[GetCulture('czech').GetNameNoFormatting]国家を設立するならば、ボヘミアおよびモラヴィアのドイツ人問題を解決しなければならない。"
austria_federation.3.f: "「なぜ地図はあんな風に見えるんだ？ 変な形だろ？」\n\n「ボヘミア人が百年前くらいに彼らを招き入れたんだ。当時は、ドイツ人かチェコ人かは問題じゃなかった。神と王の下では皆平等だった。私に言わせれば、両方ともプロテスタントを非難すべきだよ」"
austria_federation.3.a: "ボヘミアおよびモラヴィアのドイツ人には、彼ら自身の国家を持たせなければならない。"
austria_federation.3.b: "ボヘミアは統一され、ドイツ人は平等な市民として扱われる。"
austria_federation.3.c: "ドイツ人が自治を得られるなら、チェコ人はスロバキアを得られる。"
austria_federation.3.d: "チェコスロバキアは、いかなる留保もなく統一される。"

austria_federation.4.t: "スロバキアの運命"
austria_federation.4.desc: "[SCOPE.sCulture('slovak_culture').GetName]の人々が居住する土地は、長らくハンガリーと密接に絡み合ってきた。[SelectLocalization(SCOPE.sState('slovakia_state').IsValid, SCOPE.sState('slovakia_state').GetName, 'STATE_SLOVAKIA')]をハンガリーから分離する考えにふけることは、[GetCulture('hungarian').GetName]の民族主義者を確実に怒らせるだろうが、他の西スラヴ諸民族との我々の計画の信頼性を確保するかもしれない。"
austria_federation.4.f: "「それはハンガリーの首都だった。この件については本当に慎重に進めるべきだ」\n\n「そして、スロバキア人はそれがハンガリーの首都になることを望んだのか？ なぜ彼らはハンガリーのために奪われなければならないのか？ 我々はその地域に住む人々の意見、そして彼らだけの意見を考慮すべきだ。私は現実政治にはうんざりしている」"
austria_federation.4.a: "[SCOPE.sCulture('slovak_culture').GetName]国家を組織する。"
austria_federation.4.b: "[SCOPE.sCulture('slovak_culture').GetName]国家の設立を、ジプサー・ドイツ人の自治を条件とする。"
austria_federation.4.c: "スロバキアはハンガリーの一部として保持される。"
austria_federation.4.d: "チェコ人とスロバキア人の共有国家を承認する。"

austria_federation.5.t: "ガリツィアの将来"
austria_federation.5.desc: "ガリツィア地方は、ポーランド分割からの[ROOT.GetCountry.GetNameNoFlag]の戦利品を表している。この地域は伝統的に[SCOPE.sCulture('polish_culture').GetName]の貴族によって支配されてきたが、その東部の多くは[GetCulture('ukrainian').GetName]が多数を占めている。[SCOPE.sCulture('polish_culture').GetNameNoFormatting]の支持を確保するためには、有利な分割を手配しなければならない。"
austria_federation.5.f: "「どう思う？どこに線を引くべきか？」\n\n「ルテニア人はポーランド人よりも要求が低い。東西をきれいに分離すれば彼らは喜ぶが、当然より多くを期待するポーランド人は怒るだろう。レンベルクをポーランド人に渡せば、ルテニア人は他の譲歩と引き換えに我々に従うかもしれない。君の任務を羨ましくは思わないが、十分に実行可能だろう。」」"
austria_federation.5.a: "「[GetCulture('polish').GetName]国家を西ガリツィアに限定する。」"
austria_federation.5.b: "「ガリツィアを分割し、ルヴフを[GetCulture('polish').GetName]の権威下に置く。」"
austria_federation.5.c: "「ガリツィア全域を[GetCulture('polish').GetName]国家として保持する。」"

austria_federation.6.t: "「ハンガリー分割」"
austria_federation.6.desc: "「ハンガリーの伝統的国境には、多くの相当な規模の非[SCOPE.sCulture('hungarian_culture').GetName]地域が含まれている。我々は、[SCOPE.sCulture('hungarian_culture').GetName]民族を宥めるか、ハンガリーを分割して連邦構想に対する[SCOPE.sCulture('hungarian_culture').GetNameNoFormatting]の反発を招くかの選択を迫られている。」"
austria_federation.6.desc_dual: "「[SCOPE.sCulture('hungarian_culture').GetName]国家は長らく我が帝国の対等な半分を成し、非常に多様な領土を実質的に無制限に統治してきた。我々は、[SCOPE.sCountry('hungary_scope').GetNameNoFlag]を宥めるか、その諸民族に独自の国家を与えて[SCOPE.sCulture('hungarian_culture').GetNameNoFormatting]の反動を招くかの選択を迫られている。」"
austria_federation.6.f: "「この計画は実行不可能ではないかと常々心配している。ハンガリー人が反乱を起こさないか？」\n\n「ある中国の将軍が雨で遅れ、副官に遅刻の罰を尋ねた。『死罪です』と彼は答えた。そして反乱の罰はどうかと尋ねると、もちろん同じだった。そしてそうして王朝は滅んだ。我々がハンガリー人を抱える状況は全く同じだ。彼らが些細な譲歩で反乱するなら、最大限の要求を突きつけない理由があろうか？」」"
austria_federation.6.a: "「連邦内に歴史的ハンガリーを維持する。」"
austria_federation.6.b: "「[GetCulture('hungarian').GetCustom('getPluralDemonym')]はスロバキアのみを放棄せよ。」"
austria_federation.6.c: "「クロアチアとトランシルヴァニアをハンガリーから分割する。」"
austria_federation.6.d: "「ハンガリーをハンガリー人が多数派の地域に縮小する。」"

austria_federation.7.t: "「スロベニア人の土地」"
austria_federation.7.desc: "「主に[SCOPE.sState('slovenia_scope').GetName]地方に集中する[SCOPE.sCulture('slovene_culture').GetName]民族は、我が帝国の南スラヴ系諸民族の一つである。[SCOPE.sCulture('slovene_culture').GetName]国家を多くの南スラヴ国家の一つとするか、他の類似した民族と連合させるかを考慮しなければならない。」"
austria_federation.7.desc_istria: "「我が帝国南部の[SelectLocalization(SCOPE.sState('istria_scope').IsValid, SCOPE.sState('istria_scope').GetName, 'STATE_ISTRIA')]に対する[SCOPE.sCulture('slovene_culture').GetName]の主張は、[GetCulture('croat').GetName]と[GetCulture('north_italian').GetName]両民族の主張と衝突している。さらに、[SCOPE.sCulture('slovene_culture').GetName]国家を多くの南スラヴ国家の一つとするか、他の類似した民族と連合させるかの問題が存在する。」"
austria_federation.7.f: "「さて、海岸を見ると、南部は主にクロアチア人、北部はイタリア人だ。スロベニア人の部分はその中間あたりにある。少々ややこしいが、昼食前に解きほぐせるだろう。システィアーナは十分な港ではないか？」」"
austria_federation.7.a: "「スロベニア国家は海にまで及ぶ。」"
austria_federation.7.b1: "「[SelectLocalization(SCOPE.sState('istria_scope').IsValid, SCOPE.sState('istria_scope').GetName, 'STATE_ISTRIA')]に対するクロアチアとイタリアの主張を優先する。」"
austria_federation.7.b2: "「[SCOPE.sState('slovenia_scope').GetName]にスロベニア国家を創設する。」"
austria_federation.7.c: "「我が帝国には既に十分なスラヴ系国家がある。」"
austria_federation.7.d: "「ドイツ人とイタリア人の土地を除いた、スロベニア・クロアチア連合を認める。」"
austria_federation.7.e: "「連邦内の全南スラヴ人のための国家を支持する。」"

austria_federation.8.t: "「三王国」"
austria_federation.8.desc: "「[SCOPE.sCulture('croat_culture').GetName]民族が居住する王室領は、ヴェネツィアの旧領土を獲得して以来、[ROOT.GetCountry.GetNameNoFlag]と[GetCulture('hungarian').GetName]の管轄に分割されてきた。[SCOPE.sCulture('croat_culture').GetCustom('getPluralDemonym')]を満足させたいなら、全ての[SCOPE.sCulture('croat_culture').GetNameNoFormatting]民族を[SCOPE.sCulture('croat_culture').GetNameNoFormatting]国家の下に統一しなければならない。」"
austria_federation.8.desc_triune: "「[SelectLocalization(SCOPE.sCountry('croatia_scope').IsValid, SCOPE.sCountry('croatia_scope').GetName, 'CRO')]の設立は、[SCOPE.sCulture('croat_culture').GetName]民族が単一の政体の下に統一されるという長年の要求を満たした。我々は今、[SCOPE.sCulture('croat_culture').GetName]国家を多くの南スラヴ国家の一つとするか、他の類似した民族と連合させるかを考慮しなければならない。」"
austria_federation.8.f: "「南スラヴ人の問題は、潰瘍を引き起こすほど困難だった。ハンガリーは[ROOT.GetCountry.GetCapital.GetCityHubName]にとって長らく目の上の瘤であり、測量士は別の強力な行政体を提案するのを躊躇うほどだった。しかし、強力で揺るぎない忠誠を誓うイリュリアの可能性…もしかすると。もし全てが完璧に進めば、もしかすると。」"
austria_federation.8.a: "「クロアチア国家を[ROOT.GetCountry.GetAdjective]クロアチアに限定する。」"
austria_federation.8.b: "「連邦内に既存の三王国を維持する。」"
austria_federation.8.c: "「三王国の下にクロアチアの土地を統一する。」"
austria_federation.8.d: "「スロベニアとクロアチアの土地の間の連合を組織する。」"
austria_federation.8.e: "「連邦内の全南スラヴ人のための国家を支持する。」"

austria_federation.9.t: "「森の向こう」"
austria_federation.9.desc: "「[SCOPE.sCulture('romanian_culture').GetName]が居住する王室領は、我が帝国で最も多様な地域の一つである。いかなる[SCOPE.sCulture('romanian_culture').GetNameNoFormatting]領土の設立も、[GetCulture('hungarian').GetName]民族主義者を警戒させずにはおかないだろう。また、地域全体に散らばる[GetCulture('south_german').GetName]人の集団は自治を心配している。」"
austria_federation.9.f: "「ここには少なくとも三つの自治体が必要だ。おそらくそれ以上。これらのドイツ人は一体どこから来たのだ？」\n\n「我々が彼らをここに定住させたのだ——ごく最近、前回のトルコとの戦争の後だ。彼らは最後の最後で我々を悩ませに戻ってきたようだ。」」"
austria_federation.9.a: "「ルーマニア国家にバナトとトランシルヴァニア全域を与える。」"
austria_federation.9.b: "「ルーマニア国家にセーケイ地方を除く全てを与える。」"
austria_federation.9.c: "「トランシルヴァニアはルーマニア人のものだが、バナトはドイツ人のものだ。」"
austria_federation.9.d: "「ルーマニア国家をトランシルヴァニア南部に縮小する。」"
austria_federation.9.e: "「トランシルヴァニア全域は取り返しのつかないほどハンガリーのものだ。」"

austria_federation.10.t: "「西部辺境」"
austria_federation.10.desc: "「イタリア半島を席巻する民族主義の潮流は、既に我々のイタリア領土の多くを奪い取った。残る[SCOPE.sCulture('north_italian_culture').GetName]住民の支持を確保するには、イタリア人、[GetCulture('slovene').GetName]、[GetCulture('south_german').GetName]の領土間の未解決の対立を解決しなければならない。」"
austria_federation.10.desc_lomven: "「[SCOPE.sCulture('north_italian_culture').GetName]民族は、イタリア王室領の人口と経済力により、帝国で最も影響力のある民族の一つである。連邦化への彼らの支持を確保するには、イタリア人、[GetCulture('slovene').GetName]、[GetCulture('south_german').GetName]の領土間の未解決の対立を解決しなければならない。」"
austria_federation.10.f: "「海軍から手紙をもらった。徴兵数の名の下に、イタリア人に寛大であるようにと頼まれている。」\n\n「驚かないね。彼らはかなりイタリア的な組織だ。」\n\n「パレルモからも手紙をもらった。そちらは…まあ、ここでは繰り返さないが。」\n\n「言いたくはないが、そちらの方がさらにイタリア的だ。」」"
austria_federation.10.a: "「トレントとトリエステは共にイタリアのものとする。」"
austria_federation.10.b: "「トレントはイタリアのものとするが、トリエステはスラヴのものだ。」"
austria_federation.10.c: "「トリエステだけで十分である。」"
austria_federation.10.d: "「ロンバルド＝ヴェネト王国で十分な代表権がある。」"
austria_federation.10.e: "「これほど小さな人口では独自の国家を認めるに値しない。」"

austria_federation.11.t: "「辺境地帯」"
austria_federation.11.desc: "「[SelectLocalization(SCOPE.sState('east_galicia_state').IsValid, SCOPE.sState('east_galicia_state').GetName, 'STATE_EAST_GALICIA')]の[SCOPE.sCulture('ukrainian_culture').GetName]人口は、ポーランド・リトアニア共和国時代以来、[GetCulture('polish').GetName]エリートによって支配されてきた。[SelectLocalization(SCOPE.sState('east_galicia_state').IsValid, SCOPE.sState('east_galicia_state').GetCityHubName, 'HUB_NAME_STATE_EAST_GALICIA_city_polish')]市の主に[GetCulture('polish').GetNameNoFormatting]の住民は、[GetCulture('polish').GetNameNoFormatting]国家の下での自治を要求している。これを受け入れれば[GetCulture('polish').GetCustom('getPluralDemonym')]は宥まるが、[SCOPE.sCulture('ukrainian_culture').GetNameNoFormatting]国家は重要な経済的原動力を失うことになる。」"
austria_federation.11.f: "「ガリツィア？あそこには特異な力学がある。貴族たちは[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]を嫌っているが、農民たちは[ROOT.GetCountry.GetRuler.GetHerHim]を崇拝している。前回、貴族たち——ほとんどがポーランド人だ——が反乱を企てた時、農民たちは彼らの館を襲撃し、絞首刑にした。我々は反乱を企てた者たちを保護するために軍隊を送らざるを得なかった。私に言わせれば、その時点でルテニア人は国家を得る資格を得たと言える。」」"
austria_federation.11.a: "「ウクライナ国家に東ガリツィア全域を与える。」"
austria_federation.11.b: "「東ガリツィアにウクライナ国家を創設し、ルヴフをポーランドの権威下に置く。」"
austria_federation.11.c: "「ポーランド領ルヴフと引き換えに、ウクライナ人にブコヴィナを提供する。」"
austria_federation.11.d: "「ガリツィア全域はポーランドの領土である。」"

austria_federation.12.t: "「[SelectLocalization(SCOPE.sState('vojvodina_state').IsValid, SCOPE.sState('vojvodina_state').GetName, 'STATE_DELVIDEK_serbian')]のセルビア人」"
austria_federation.12.desc: "「[SCOPE.sState('vojvodina_state').GetName]州は長らく[SCOPE.sCulture('serb_culture').GetName]文化の中心地として機能してきた。この地域の[SCOPE.sCulture('serb_culture').GetNameNoFormatting]人口は、首都を[SCOPE.sState('vojvodina_state').GetCityHubName]とする[SCOPE.sCulture('serb_culture').GetNameNoFormatting]国家の形成を要求している。この提案は、地元の[GetCulture('hungarian').GetName]と[GetCulture('south_german').GetName]コミュニティから反対を受けている。」"
austria_federation.12.f: "「提案を発表する時は、ハンガリー人だけがそれをウーイヴィデークと呼ぶことを忘れるな。他の皆はノヴィ・サドと呼んでいる。我々にとってはノイザッツだ。」\n\n測量士はその名前を消した。「かなりごちゃごちゃした地域だな？」\n\n「君が知る以上にね。あの街はかつてセルビアのアテネと呼ばれた——もし我々が彼らに有利な決定をすれば、再びそうなるかもしれない。」」"
austria_federation.12.a: "「[SCOPE.sState('vojvodina_state').GetNameNoFormatting]をハンガリーから分割し、セルビア国家とする。」"
austria_federation.12.b: "「[SCOPE.sState('vojvodina_state').GetNameNoFormatting]はハンガリー内に留まらなければならない。」"
austria_federation.12.c: "「連邦内の全南スラヴ人のための国家を支持する。」"

croats_are_fine_tt: "「#b 三王国#!が設立されたため: #indent_newline:3 \n• [GetCulture('croat').GetName]は将来の[Concept('concept_integrated_culture','$concept_integrated_culture_process$')]から[Concept('concept_disqualified_culture','$concept_disqualified_culture_short$')]に#b ならない#!#!」"
because_hungarian_anger_is_low_tt: "「#b ハンガリー#!の[concept_liberty_desire]または[Concept('concept_radical', '$concept_radicalism$')]が低いため: #indent_newline:3 \n• [GetCulture('hungarian').GetName]は将来の[Concept('concept_integrated_culture','$concept_integrated_culture_process$')]から[Concept('concept_disqualified_culture','$concept_disqualified_culture_short$')]に#b ならない#!#!」"
because_hungarian_anger_is_high_tt: "「#b ハンガリー#!の[concept_liberty_desire]または[Concept('concept_radical', '$concept_radicalism$')]が高いため: #indent_newline:3 \n• [GetCulture('hungarian').GetName]は将来の[Concept('concept_integrated_culture','$concept_integrated_culture_process$')]から[Concept('concept_disqualified_culture','$concept_disqualified_culture_short$')]になる#!#!\n• [GetPlayer.MakeScope.ScriptValue('small_radicals')|-=1%]の[GetCulture('hungarian').GetName]の[Concept('concept_pop', '$concept_pops$')]が[ROOT.GetCountry.GetNameNoFlag]およびその非[GetCulture('hungarian').GetName]の[concept_personal_union]と[concept_crown_land]の[Concept('concept_subject', '$concept_subjects$')]において、より[concept_radical]になる#!#!」"
because_lombardy_venetia_tt: "「[ROOT.GetCountry.GetName]が#b ロンバルディア#!または#b ヴェネト#!を保持しているため: #indent_newline:3 \n• [GetCulture('north_italian').GetName]は[Concept('concept_integrated_culture','$concept_integrated_culture_short$')]に成功し、[ROOT.GetCountry.GetNameNoFlag]の[Concept('concept_primary_cultures','$concept_primary_culture$')]になる#!#!」"

