ruler_is_romance_tt: "[ROOT.GetCountry.GetNameNoFlag]の[concept_ruler]は、#v $language_hispanophone$#! [Concept('concept_discrimination_trait','$concept_discrimination_trait_short$')]を持つ[concept_culture]である"

subjecthood_events.1.t: "多から一へ"
subjecthood_events.1.d_1: "[ROOT.GetCountry.GetAdjectiveNoFlag]国家による[SCOPE.sCulture('relevant_primary_culture').GetName]民族主義の受容は、[SCOPE.sCulture('relevant_minority_culture').GetName]コミュニティの間で強制同化への恐怖を引き起こしました。彼らは[SCOPE.sLaw('current_law_scope').GetName]を制定しようとするあらゆる試みに反対することを誓約しました。"
subjecthood_events.1.d_2: "[ROOT.GetCountry.GetAdjectiveNoFlag]国家による[SCOPE.sCulture('relevant_primary_culture').GetName]と[SCOPE.sCulture('relevant_primary_culture_2').GetName]民族主義の受容は、[SCOPE.sCulture('relevant_minority_culture').GetName]コミュニティの間で強制同化への恐怖を引き起こしました。彼らは[SCOPE.sLaw('current_law_scope').GetName]を制定しようとするあらゆる試みに反対することを誓約しました。"
subjecthood_events.1.d_3: "[ROOT.GetCountry.GetAdjectiveNoFlag]国家による民族主義の受容は、[SCOPE.sCulture('relevant_minority_culture').GetName]コミュニティの間で強制同化への恐怖を引き起こしました。彼らは[SCOPE.sLaw('current_law_scope').GetName]を制定しようとするあらゆる試みに反対することを誓約しました。"
subjecthood_events.1.f:1 "村の人々は長い間、[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]の忠実な臣民でした。確かに、問題はありました――脱税、個人の反乱、不満を抱く農民の典型的な不平――しかし、彼らは結局のところ忠実でした。そして、[ROOT.GetCountry.GetCapital.GetCityHubName]からの知らせが届き、大きな不安感がそれに伴いました。政府はこれから[SCOPE.sCulture('relevant_primary_culture').GetNameNoFormatting]語で法令を発布するというのです。その言語を話す者はほとんどおらず、読める者はさらに少ない。[SCOPE.sCulture('relevant_minority_culture').GetNameNoFormatting]語はもはや十分ではない。「学べ」と、それは言っているようだった。「我々の言葉で話せ、さもなければ何も言うな」と。"
subjecthood_events.1.a: "なぜ彼らは進歩に抵抗し続けなければならないのか？"
subjecthood_events.1.b: "人は[SCOPE.sCulture('relevant_minority_culture').GetName]でありながら、同時に[ROOT.GetCountry.GetAdjectiveNoFlag]人でもあり得る。"

subjecthood_events.2.t: "理想の市民"
subjecthood_events.2.d_1: "国民的市民権の本質についての議論が、[SCOPE.sState('relevant_state').GetCityHubName]のサロンで起こっています。[SCOPE.sLaw('current_law_scope').GetName]の下での[SCOPE.sCulture('relevant_primary_culture').GetName]優位性というビジョンが、より普遍主義的な理想と衝突するようになりました。"
subjecthood_events.2.d_2: "国民的市民権の本質についての議論が、[SCOPE.sState('relevant_state').GetCityHubName]のサロンで起こっています。[SCOPE.sLaw('current_law_scope').GetName]の下での[SCOPE.sCulture('relevant_primary_culture').GetName]と[SCOPE.sCulture('relevant_primary_culture_2').GetName]優位性というビジョンが、より普遍主義的な理想と衝突するようになりました。"
subjecthood_events.2.d_3: "国民的市民権の本質についての議論が、[SCOPE.sState('relevant_state').GetCityHubName]のサロンで起こっています。[SCOPE.sLaw('current_law_scope').GetName]の下での国家の公認民族の優位性というビジョンが、より普遍主義的な理想と衝突するようになりました。"
subjecthood_events.2.f: "「[SCOPE.sCharacter('name_a_scope').GetLastNameNoFormatting]少佐がまた陰謀を企てている。」\n\n[SCOPE.sCharacter('name_b_scope').GetFirstNameNoFormatting]は友人の親指が指す方向に頭を向けた。そこには確かに、いつもと同じ軍服を着た少佐がいた。彼は何かを話し合うために仲間に身を乗り出していたが、それは秘密にしたいという真の欲求というよりは、見せかけのためだった。\n\n「そうだな。『名誉と忠誠』、彼はいつもそう言う、『名誉と忠誠』。先週、良い市民とは何かについて話した時、彼は同じことを言った。」\n\n「で、君は何て言ったの？」」"
subjecthood_events.2.a: "「良い市民であるためには、良い[SCOPE.sCulture('relevant_primary_culture').GetCustom('getSingularDemonym')]でなければならない。」"
subjecthood_events.2.b: "「もちろん、彼が正しいと。だが、何よりも忠誠心だ。」"
subjecthood_events.2.c: "「[ROOT.GetCountry.GetAdjectiveNoFormatting]人であることは、それ自体が一つの国籍だ。」"

subjecthood_events.3.t: "[SCOPE.sCulture('relevant_primary_culture').GetCustom('getPluralDemonym')]の[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]"
subjecthood_events.3.d: "政府が[SCOPE.sLaw('current_law_scope').GetName]を制定しようとする努力に励まされ、[SCOPE.sCulture('relevant_primary_culture').GetName]民族主義者たちは儀式的に、[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle] [SCOPE.sCharacter('ruler_scope').GetFullName]に「[SCOPE.sCulture('relevant_primary_culture').GetCustom('getPluralDemonym')]の[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]」という称号を献上しました。この称号を受け入れることは、[SCOPE.sCharacter('ruler_scope').GetHerHis]権力が究極的には国民に由来するという主張を正当化することになります。"
subjecthood_events.3.f: "「ナポレオンが戴冠した時、彼は『$french$国民の唯一の利益、幸福、栄誉のために』統治することを誓った。これが彼に権力を与え、すべての敵に打ち勝つことを可能にしたのだ。[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]が望めば、[SCOPE.sCharacter('ruler_scope').GetSheHe]も同じことができよう、[SCOPE.sCulture('relevant_primary_culture').GetNameNoFormatting]国民を念頭に置いて。」\n\n[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]は、請願者を思慮深い表情で見つめた。\n\n「そして、ナポレオンはどうなった？」\n\n「彼は不死となられました、[SCOPE.sCharacter('ruler_scope').GetCustom('getLadyLordSpouse')|l]。」」"
subjecthood_events.3.a: "万歳、[SCOPE.sCulture('relevant_primary_culture').GetCustom('getPluralDemonym')]の[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]よ！"
subjecthood_events.3.b: "権力は国民からではなく、[SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')]に由来する。"

subjecthood_events.4.t: "臣民から市民へ"
