je_metternich: "メッテルニヒの時代"
je_metternich_reason: "#b ナポレオン戦争#!の余波により、[ROOT.GetCountry.GetName]はヨーロッパにおける主要な保守勢力としての地位を確立した。ナポレオン後の秩序の主要な設計者である[SCOPE.sCharacter('metternich_scope').GetFullName]は、激動の年1821年以来、[ROOT.GetCountry.GetNameNoFormatting]の宰相を務めている。[SCOPE.sCharacter('metternich_scope').GetHerHis|U]の課題は、[ROOT.GetCountry.GetAdjectiveNoFormatting]の[GetLawType('law_autocracy').GetName]の維持、ヨーロッパにおける保守的な平和の維持、そして芸術と科学の振興である。\n\n#b メッテルニヒの課題:#!\nメッテルニヒ宰相の課題の様々な項目を達成することは、この[concept_journal_entry]の効果を改善する。これらの達成は、この日誌が#b 完了#!した時に評価される。\n• [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_ita_checkbox')] #b $ITA_ADJ$#!の[Concept('concept_unification', '$concept_unification_short$')]を阻止した\n• [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_ger_checkbox')] #b $GER$#!が他の[concept_country]によって[Concept('concept_unification', '統一')]されていない\n• [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_art_checkbox')] [ROOT.GetCountry.GetNameNoFlag]が[GetGoods('fine_art').GetName]の主要生産国である\n• [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_krakow_checkbox')] [ROOT.GetCountry.GetNameNoFlag]が[GetStateRegion('STATE_WEST_GALICIA').GetName]の[concept_state_region]全体を所有している\n• [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_tech_checkbox')] [ROOT.GetCountry.GetNameNoFlag]が[GetPlayer.MakeScope.ScriptValue('metternich_tech_target')|v0]の[Concept('concept_technology', '$concept_technologies$')]を研究済みである (現在 [GetPlayer.MakeScope.ScriptValue('techs_researched_script')|v0])[SCOPE.GetRootScope.GetCountry.GetCustom('metternich_system_entry')][SCOPE.GetRootScope.GetCountry.GetCustom('metternich_system_cohesion_entry')]\n• [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_movement_checkbox')] すべての#tooltippable;tooltip:[GetPlayer.GetTooltipTag],liberal_movements_list_tt 自由主義#!または#tooltippable;tooltip:[GetPlayer.GetTooltipTag],socialist_movements_list_tt 社会主義#!の[Concept('concept_political_movement','$concept_political_movements$')]の支持が#b 限定的#!である\n• [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_laws_checkbox')] [ROOT.GetCountry.GetNameNoFlag]が[GetLawType('law_autocracy').GetName]、[GetLawType('law_censorship').GetName]、[GetLawType('law_secret_police').GetName]を有している\n• [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_institution_checkbox')] #b $institution_home_affairs$#!および#b $institution_police$#!の[Concept('concept_institution', '$concept_institutions$')]がレベル#v 3#!以上である"

metternich_system_box_tt: "\n• [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_bloc_checkbox')] [ROOT.GetCountry.GetPowerBloc.GetName]が[GetPlayer.MakeScope.ScriptValue('metternich_bloc_target')|v0]以上の[Concept('concept_power_bloc_member','$concept_power_bloc_members_extra_short$')]を有している (現在 [GetPlayer.MakeScope.ScriptValue('num_power_bloc_members_script')|v0])"
metternich_system_cohesion_box_tt: "\n• [SCOPE.GetRootScope.GetCountry.GetCustom('metternich_bloc_cohesion_checkbox')] [ROOT.GetCountry.GetPowerBloc.GetName]の[concept_power_bloc_cohesion]が[GetPlayer.MakeScope.ScriptValue('metternich_bloc_cohesion_target')|v0]より高い (現在 [GetPlayer.MakeScope.ScriptValue('power_bloc_cohesion_script')|v0])"

