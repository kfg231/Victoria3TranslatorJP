# Technocracy

je_technocracy: "新たな機械"
je_technocracy_reason: "[ROOT.GetCountry.GetName]における[GetLawType('law_technocracy').GetName]の確立は、有能で秩序正しく豊かな社会の実現に向けた大きな一歩を表している。しかし、[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]と[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]が存在するだけでは、旧秩序の過ちと非効率性を消し去るには不十分である。社会変革を実現するためにはまだ多くの作業が残っており、大衆は我々の計画に懐疑的である。\n\n新体制を確固たるものにするためには、我々の議題を完了し、$law_technocracy$が彼らが望む平和と豊かさの時代を実現することを示さなければならない。"

je_technocracy_progress_bar: "新たな機械"
je_technocracy_progress_bar_desc: "進捗: #v [JournalEntry.GetCurrentBarProgress(ScriptedProgressBar.Self)|%]#! ([JournalEntry.GetCurrentBarValue(ScriptedProgressBar.Self)|1]/[GetPlayer.MakeScope.ScriptValue('technocracy_upper_bound')])"
je_technocracy_complete_tt: "#variable $je_technocracy_progress_bar$#!進捗バーが#variable 100%#!に到達した"

technocracy.4.t: "科学による改善"
technocracy.4.d: "[ROOT.GetCountry.GetName]は、[GetIdeology('ideology_technocratic').GetName]統治下で、国内の安定と一貫した改善の期間を経験した。以前は懐疑的だった社会の層が広く[GetLawType('law_technocracy').GetName]を理想的な統治形態として受け入れるようになった。"
technocracy.4.f: "「テクノクラシーにおいて、我々は科学が希少性の経済を豊かさの経済に置き換えるのを見る。\nテクノクラシーにおいて、我々は機能的な有能さが奇怪で浪費的な無能さに取って代わり、事実が推測に取って代わり、秩序が無秩序に取って代わり、産業計画が産業の混沌に取って代わるのを見る。\nテクノクラシーは、人間の知性にふさわしい文明を築こうとする科学の試みである。」\n\n— ハワード・スコット、「テクノクラシー：科学対混沌」"
technocracy.4.a: "新世界がこれほど近づいたことはない。"
technocracy.4.b: "我々の手法は社会のあらゆる側面に及ばなければならない。"

