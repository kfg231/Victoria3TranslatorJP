je_danubian_federation_czech_button: "[GetCulture('czech').GetName]の懸念に対処する"
je_danubian_federation_czech_button_desc: "かつての#bボヘミア王冠領#!が#bボヘミア#!、#bモラヴィア#!、#bシレジア#!の王冠領に分割されたことは、[GetCulture('czech').GetName]民族主義者にとって長年の不満の種であった。さらに、[GetCulture('czech').GetNameNoFormatting]地域内に大きな[GetCulture('south_german').GetName]少数民族が存在することは、継続的な民族間緊張の源となっている。この地域を連邦に統合するためには、[GetCulture('south_german').GetNameNoFormatting]少数民族を疎外することなく、ボヘミアを再統一する解決策を考案しなければならない。"
