peoples_springtime.71.t: "平和、自由、そして調和"
peoples_springtime.71.d: "[ROOT.GetCountry.GetName]の自由主義政府は、絶対主義の復活と社会革命という二重の脅威を見事に乗り越えた。革命的な激動の時代は平和的に終わりを迎えた。"
peoples_springtime.71.f:1 "自由である術ほど驚異に満ちたものはない。しかし、自由への徒弟時代ほど困難なものもない。"\n\n—アレクシ・ド・トクヴィル、#italic アメリカのデモクラシー#!" #- Alexis de Tocqueville
peoples_springtime.71.a: "自由の時代が[ROOT.GetCountry.GetNameNoFormatting]に訪れる。"
peoples_springtime.71.b: "[SCOPE.sCulture('primary_culture_scope').GetName]の人々は自由を勝ち取った。"

modifier_age_of_liberty: "自由の時代"

modifier_red_summer: "革命的な混乱"

king_in_parliament_tt: "この[concept_country]のジャーナルに#b 議会における王#!を追加する"
je_king_in_parliament: "議会における[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]"
je_king_in_parliament_reason: "[ROOT.GetCountry.GetName]における絶対主義支配の終焉は、[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]と[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]の間の権力の均衡という問題を解決していない。新たな議会秩序を確固たるものとするためには、[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]の意思よりも人民の意思が上位にあることを確立しなければならない。"
je_king_in_parliament_goal: "以下の条件が合計#v 10#!年間真でなければならない:"
je_king_in_parliament_complete_tt: "[GetIdeology('ideology_absolutist_movement').GetName]の[Concept('concept_political_movement','$concept_political_movements$')]は[GetIdeology('ideology_royalist_movement').GetName]の$concept_political_movements_short$に置き換えられる"

autocracy.4.t: "責任政府"
autocracy.4.d: "[ROOT.GetCountry.GetAdjectiveNoFlag]議会秩序の安定により、王党派は絶対主義復活の望みを捨てた。立憲君主制が新たな現状として確立された。"
autocracy.4.f: "議会は、政府に生命と運動を与える至高かつ絶対的な権力である。それは我々の平和の親、信仰の擁護者、財産の基盤として、政府のあらゆる様々な手続きを指揮し、推進する。そして、この偉大な源泉、すなわち事象の原動力を構成するものが強さと美しさを持つならば、それから派生するあらゆる行為と成果もまた、相応の比率と類似性を示すであろう。" #- the 1st Earl of Shaftesbury
autocracy.4.a: "[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]に乾杯!"
autocracy.4.b: "[SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')]が[SCOPE.sCharacter('ruler_scope').GetPrimaryRoleTitle]をお救いくださいますように!"

modifier_constitutional_monarch: "敬愛される象徴"
modifier_constitutional_monarch_movement_support: "敬愛される君主"
modifier_constitutional_order: "立憲秩序"

je_balkan_national_awakenings: "国民覚醒"
je_balkan_national_awakenings_reason: "[ROOT.GetCountry.GetName]は国民国家への第一歩を踏み出したが、依然として農民の国である。我々の人口の多くは、国民的同胞愛というよりも、村や氏族のレンズを通して世界を見続けている。我々は国民の間で文化的な[concept_fervor]を育み、[SCOPE.sCulture('primary_culture_scope').GetName]の人々から統一された国家を構築しなければならない。\n\n[SCOPE.sCulture('primary_culture_scope').GetName]文化の[concept_fervor]は以下の条件によって影響を受ける:\n• [SCOPE.sCulture('primary_culture_scope').GetName]の[Concept('concept_pop', '$concept_pops$')]の平均[concept_literacy]\n• [SCOPE.sCulture('primary_culture_scope').GetName]の[GetPopType('academics').GetName]の数\n• #b $nationalism$#!と#b $pan-nationalism$#!を研究している[SCOPE.sCulture('primary_culture_scope').GetName]国家\n• [SCOPE.sCulture('primary_culture_scope').GetName]ポップの平均[concept_acceptance]\n• 独立またはかつて独立していた[SCOPE.sCulture('primary_culture_scope').GetName]国家"

claims_on_all_homelands_tt: "[ROOT.GetCountry.GetName]は、すべての[SCOPE.sCulture('primary_culture_scope').GetName]の[Concept('concept_homeland','$concept_homelands$')]に対する[Concept('concept_claim', '$concept_claims$')]を獲得する"

has_formed_yugoslavia_tt: "#v $YUG$#!を形成している"

national_awakening.1.t: "[SCOPE.sCulture('primary_culture_scope').GetNameNoFormatting]復興"
national_awakening.1.d: "[ROOT.GetCountry.GetAdjective]国家が国民的熱狂を育むための努力は、文化的ルネサンスをもたらした。[SCOPE.sState('rural_state').GetName]の最も遠隔の村々でさえ、我々の市民は今や[SCOPE.sCulture('primary_culture_scope').GetName]国民の一員としての自らの立場を理解している。"
national_awakening.1.f: "国勢調査員は小屋の扉が開くのを見つめた。それは彼がこれまで訪れた中で最も遠隔の村で、馬が二頭と一本の曲がりくねった道があるだけの場所だった。男が戸口に立ち、真鍮のボタンを見てきびきびと敬礼した。\n\n「お名前は？」\n\n「[SCOPE.sCharacter('relevant_character').GetFullNameNoFormatting]です」と戸口の男は答えた。\n\n「どちらのご出身ですか？」\n\n「私は[SCOPE.sCulture('primary_culture_scope').GetNameNoFormatting]人です、旦那様。父もその父もそうでしたから」"
national_awakening.1.a: "[SCOPE.sCulture('primary_culture_scope').GetNameNoFormatting]人民万歳!"
national_awakening.1.b: "偉大な国家には偉大な軍隊がふさわしい。"

modifier_fervour_military_bonus: "民族主義的熱狂"
modifier_fervour_military_bonus_ig: "掻き立てられた民族主義的熱狂"

2TAB: ""

national_awakening.2.t: "村の学校教育"
national_awakening.2.d: "政府の給与を受け取っている[GetPopType('academics').GetName]が、[SCOPE.sState('relevant_state').GetName]の田園地帯に村の学校を設立した。これらの村の学校は識字率を向上させ、農民の間で[SCOPE.sCulture('relevant_culture').GetName]の国民的アイデンティティの感覚を育むことを目指している。"
national_awakening.2.f: "「我が国は不運でした」と教師は語り始めた。「まだ完全には統一されていません。この地では、我々の民は外国人に依存しています」\n\n彼女は壁の地図、黒く塗られたいくつかの地域を指し示した。\n\n「これらの州では外国人が支配しており、我々の兄弟にとっては非常に困難なのです…」" #- Patterned off of a fourth-grade textbook for Serbian students by Protić and Stojanović
national_awakening.2.a: "素晴らしい取り組みだ。"
national_awakening.2.b: "追加資金を提供する。"

national_awakening.3.t: "国民叙事詩"
national_awakening.3.d: "最近発表された伝統的な[SCOPE.sCulture('relevant_culture').GetName]の詩と歌の編纂集が、識字率が高まりつつある[ROOT.GetCountry.GetName]の国民を魅了している。[SCOPE.GetRootScope.GetCountry.GetCustom('country_national_epic_name')]のよく読まれた写本が、今や[ROOT.GetCountry.GetCapital.GetCityHubName]のすべての本棚に見つけられるだろう。"
national_awakening.3.f: "印刷所はかつてないほど忙しかった。温かい紙を運ぶ労働者たちが、革張りに糊付けされる作業場へとせわしなく動き回っていた。奥では、巨大な印刷機がページを次々と生み出し、それぞれが優雅な組紐模様と花の画像で飾られていた。この50部の束は[ROOT.GetCountry.GetCapital.GetCityHubName]へ、これは[ROOT.GetCountry.GetCapital.GetFarmHubName]へ向かうものだった。個人や書店からの注文書が同様にカウンターの上に積み上げられ、元帳への記入を待っていた。\n\n正面から叫び声が響いた。そこから制服を着た男がちょうど立ち去ったところだった。「省からの注文だ - 金曜日までに200部欲しいそうだ！」"
national_awakening.3.a: "我が国を一つに結びつける作品。"
national_awakening.3.b: "我が国の傑出した人々に乾杯!"

national_awakening.4.t: "口語訳で"
national_awakening.4.d: "著名な学者[SCOPE.sCharacter('intelligentsia_leader').GetFullName]が新約聖書を[SCOPE.sCulture('relevant_culture').GetName]語に翻訳した。[SCOPE.sCulture('relevant_culture').GetNameNoFormatting]語で書かれた作品の増大するコーパスは、聖職者や知識人の間でのこの言語の威信を高めるきっかけとなった。"
national_awakening.4.f:1 "「私は#italic プリンキピア#!の[SCOPE.sCulture('relevant_culture').GetNameNoFormatting]語版を注文しました。同僚の一人は同じ言語での完全な聖書を求めています。もし我々が毎年一つずつ価値ある作品を翻訳し、それぞれの翻訳を他の者を教える学生が行うならば、今世紀末までにかなりのコーパスができるでしょう。それどころか、供給者が需要を認識すれば、はるかに多くのものができるでしょう。」\n\n「確かに野心的な試みだ。部署全体を変えられると思うか？」\n\n「私は、我々の言語が他の者が学びたいと思う言語となる未来を"
national_awakening.4.a: ""
national_awakening.4.b: ""

national_awakening.5.t: ""
national_awakening.5.d: ""
national_awakening.5.f: "[SCOPE.sCulture('relevant_culture').GetNameNoFormatting]民族の擬人像が前景に立ち、ローブをまとい[ROOT.GetCountry.GetAdjectiveNoFormatting]の旗を掲げていた。彼女の足首からは、不名誉な過去の影へと続く壊れた鎖が垂れ下がっている。背景には、[ROOT.GetCountry.GetNameNoFormatting]にしか見られない美しさが広がり、それは国民の色に輝く昇る太陽の光に照らされていた。\n\nそれは誰もが理解できるが、再現できる者はほとんどいないメッセージを帯びていた。暗い過去から、輝かしい新たな春が。抑圧から、自由が。"
national_awakening.5.a: "パリの傑作を凌駕する作品に。"
national_awakening.5.b: "これを我が国の最新の象徴としよう。"

national_awakening.6.t: "民間伝承"
national_awakening.6.d: "共通の国民的アイデンティティの探求は、[SCOPE.gsInterestGroup('intelligentsia_ig').GetName]の関心を田園地帯に向けさせた。[SCOPE.gsInterestGroup('rural_folk_ig').GetName]の伝統を研究することは、外国支配に汚されていない原初の[SCOPE.sCulture('relevant_culture').GetNameNoFormatting]文化を垣間見ることとして広く認識されている。"
national_awakening.6.f: "「アレクサンドロス大王は最初の[SCOPE.sCulture('relevant_culture').GetNameNoFormatting]だったと言われている。彼の帝国が分裂した時、彼の将軍たちが最初の[SCOPE.sCulture('relevant_culture').GetNameNoFormatting]王国を築いたと」\n\n「そうなのか？」\n\n「人々がそう言っていることか、それが真実かということか？」\n\n「後者だ」\n\n「違いはないだろう？ 十分な人々がそう言えば、我々がそれを真実にするのだから」"
national_awakening.6.a: "かくして国家の種は育つ。"
national_awakening.6.b: "我々は真の国から学ぶべきことが多い。"

national_awakening.7.t: "一つの国家、一つの国民"
national_awakening.7.d: "国家が[SCOPE.sCulture('primary_culture').GetName]としての共通のアイデンティティによって国民を定義しようとする努力は、その[SCOPE.sCulture('minority_culture').GetName]人口の間に警戒感を駆り立てている。多くの[SCOPE.sCulture('minority_culture').GetNameNoFormatting]人々は、自分たちが支配的文化へ同化を強制されることを恐れている。"
national_awakening.7.f: "「もし彼が卒業を望むなら、[SCOPE.sCulture('primary_culture').GetNameNoFormatting]語を学び、[SCOPE.sCulture('primary_culture').GetNameNoFormatting]語で書かれた試験に合格しなければならない。現時点では特別な配慮はできない」\n\n女性は[SCOPE.sCulture('minority_culture').GetNameNoFormatting]語で返答した。彼女の息子は申し訳なさそうな表情で、彼女の発言を役人の言語で伝えた。\n\n「では、[SCOPE.sCulture('minority_culture').GetNameNoFormatting]語を学ぶことはどうなのですか？ ここには我々のような者が大勢いますし、家ではそれを話します。[SCOPE.sCulture('minority_culture').GetNameNoFormatting]語の授業がなければ、家を出れば忘れてしまい、家族とのつながりをすべて失ってしまいます」\n\n「ご婦人、私の助言は、[SCOPE.sCulture('primary_culture').GetNameNoFormatting]語を学ぶことです。あなたは[ROOT.GetCountry.GetAdjectiveNoFormatting]の市民でしょう？」"
national_awakening.7.a: "彼らは、確かに[SCOPE.sCulture('primary_culture').GetCustom('getPluralDemonym')]にならなければならない。"
national_awakening.7.b: "彼らが恐れることは何もない。"

