je_the_hungry_forties_reason: "作物の疫病の波が[concept_georegion_europe]を襲い、不作と食糧不足を引き起こしている。この疫病は特にジャガイモに対して致命的で、腐敗して悪臭を放つ食べられないペースト状に急速に変質させる。\n\n#b ヨーロッパジャガイモ疫病#!:\nこの[concept_journal_entry]が有効な間、ヨーロッパの[concept_state]で$disease_outbreak$の[concept_harvest_condition]が発生する確率が大幅に上昇する。"

