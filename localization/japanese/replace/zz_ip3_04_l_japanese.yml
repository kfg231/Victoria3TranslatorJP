### Federal Project
je_danubian_federation_observer: "連邦構想"
je_danubian_federation_observer_reason: "[SCOPE.sCountry('austria_scope').GetName]政府は、[SCOPE.sCountry('austria_scope').GetAdjectiveNoFormatting]帝国の領土を、民族線に沿って描かれた自治国家の連邦へと再編成する提案を支持した。この提案は、現在帝国を形成している複雑な王領地と同君連合のネットワークを廃止し、最終的にはウィーンに責任を負う連邦構造に置き換えるものである。\n\nもし[SCOPE.sCountry('austria_scope').GetNameNoFlag]が#v $je_danubian_federation$#! [concept_journal_entry]を#b 完了#!すれば、[ROOT.GetCountry.GetName]の伝統的な権利と特権は廃止され、我々の土地は直接[SCOPE.sCountry('austria_scope').GetCustom('future_kuk_name')|v]に統合される。"

has_been_integrated_into_federation_tt: "[SCOPE.sCountry('austria_scope').GetName]は、以下を通じて#v $je_danubian_federation$#!を#b 完了#!し、#v $dyn_c_usga$#!を形成した：#indent_newline:3"
has_been_integrated_into_federation_republic_tt: "[SCOPE.sCountry('austria_scope').GetName]は、以下を通じて#v $je_danubian_federation$#!を#b 完了#!し、#v $KUK$#!を形成した：#indent_newline:3"
austria_has_failed_je_danubian_federation_tt: "[SCOPE.sCountry('austria_scope').GetName]は、以下を通じて#v $je_danubian_federation$#!に#b 失敗#!した：#indent_newline:3"

has_been_integrated_by_austria_tt: "連邦に満足に[Concept('concept_integrated_culture','$concept_integrated_culture_short$')]されている"

austria_federation.13.t: "連邦帝国"
austria_federation.13.d: "[SCOPE.sCountry('austria_scope').GetName]政府は、帝国を連邦国家へと再編成する提案を公式に支持した。もし首尾よく施行されれば、これは[ROOT.GetCountry.GetNameNoFlag]の現在の自治権の終わり、そして我々の歴史的領土の喪失を意味する可能性がある。"
austria_federation.13.f: "「この観点からすれば、それは[SCAPE.sCountry('austria_scope').GetNameNoFormatting]の「没落」の問題ではなく、再編成、再生の問題である。この帝国を心から気にかけるすべての人々が、たとえ暗い憧れの中にあっても、正しい前進の道を完全に自覚することができさえすればよい。第一に、独立した民族国家だけが存在する権利があるというのは真実ではない。$SWI$、多く引用され正当にも引用される例は、混合民族政体の典型であり、その存在権を合理的に否定しようとする者はいない。実際、我々の帝国において、歴史的過程は、新たに目覚めた必要性に対応する、民族国家関係の近代的形式を求めて闘っているに過ぎない。」\n\n— アウレル・ポポヴィチ、#italic 『大オーストリア合衆国』#!" # Intentional that this is the same as austria_federation.1 but with a changed scope.
austria_federation.13.a: "連邦には[ROOT.GetCountry.GetNameNoFlag]の居場所がある。"
austria_federation.13.b: "我々が主権を守らねばならないなら、それもまたよし。"

austria_federation.14.t: "沈みゆく船から離れて"
austria_federation.14.d: "[SCOPE.sCountry('austria_or_danubia_scope').GetName]からの我々の独立は、[SCOPE.sCountry('austria_or_danubia_scope').GetCapital.GetCityHubName]からの干渉の危険を永久に終わらせた。[SCOPE.sCountry('austria_or_danubia_scope').GetAdjectiveNoFlag]政府がその構想を続けようと続けまいと、我々はその一部にはならない。"
austria_federation.14.f: "[ROOT.GetCountry.GetCapital.GetCityHubName]は"
austria_federation.14.a: ""
austria_federation.14.b: ""

austria_federation.15.t: "[SCOPE.sCountry('relevant_subject').GetAdjective]政府が協力を誓約"
austria_federation.15.d: "[SCOPE.sCountry('relevant_subject').GetName]政府は、帝国を連邦化する我々の計画に全面的に協力することを誓約した。我々の[SCOPE.sCulture('primary_culture_scope').GetName]人口の多くが彼らの決定を支持している。"
austria_federation.15.f: "「さっき、大臣が笑っていたよ。聞いたか？」\n\n[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]の声は、隣席の者が磁器にスプーンを当てる音よりわずかに大きいだけだった。同僚の一人が顔を上げ、その発言に眉を上げて彼を見た。\n\n「ほとんど信じられないな」と彼は言った。「どこで聞いたんだ？」\n\n「この目で見たよ。彼はロビーにいて、どこかの大佐か何かと一緒だった」\n\n「[SCOPE.sCulture('primary_culture_scope').GetCustom('getPluralDemonym')]に違いない」とテーブルの端に座る男が言った。「昨夜、[SCOPE.sCountry('relevant_subject').GetCapital.GetCityHubName]から馬車が来たが、誰が乗っていたかは言わなかった。何か面白いことが進行中だ」"
austria_federation.15.a: "友情の精神がドナウに咲く。"
austria_federation.15.b: "彼らの意見は必要ない。"
inform_vienna_tt: "[ROOT.GetCountry.GetTopOverlord.GetName]は、我々の該当する全ての[concept_primary_cultures]を[Concept('concept_integrated_culture','$concept_integrated_culture_present$')]する機会を得る。"

austria_federation.16.t: "[SCOPE.sCountry('relevant_subject').GetAdjective]政府が統合を拒否"
austria_federation.16.d: "[SCOPE.sCountry('relevant_subject').GetName]政府は、帝国を連邦化する我々の計画に反対することを誓約した。我々の[SCOPE.sCulture('primary_culture_scope').GetName]人口の多くが彼らを支持する可能性が高い。"
austria_federation.16.f: "手紙はいつもの話でいっぱいだった。国家主権、[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]の越権行為、[SCOPE.sCountry('relevant_subject').GetAdjectiveNoFormatting]諸邦の古来の権利と特権。送られた最初のそのような手紙ではなく、おそらく最後でもないだろうが、これまでで最も都合の悪いものだった。政府の壮大な計画に対する側面からの魚雷。役人はそれを大臣に送るためのトレイに置いた。\n\n彼の視線は、部屋の反対側でコーヒーをすすっている同僚に留まった。「別の計画はあるのか？」\n\n「言えない」\n\n「知らないからか、それとも軍事機密だからか？」\n\n「言えない」"
austria_federation.16.a: "彼らなしで何とかやらなければならない。"
