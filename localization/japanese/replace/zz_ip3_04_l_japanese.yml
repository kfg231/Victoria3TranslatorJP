je_danubian_federation_slovak_button: "[GetCulture('slovak').GetName]の懸念に対処する"
je_danubian_federation_slovak_button_desc: "[GetCulture('slovak').GetName]の人々が住む土地は長い間#b$HUN_ADJ$#!王冠の下に組織され、その結果、民族アイデンティティの成長を妨げる激しいマジャル化政策にさらされてきた。これに加え、[GetCulture('czech').GetName]と[GetCulture('slovak').GetNameNoFormatting]の民族主義者は歴史的に緊密な関係を維持しており、一部からは[GetCulture('czech').GetNameNoFormatting]-[GetCulture('slovak').GetNameNoFormatting]共同体の設立が提唱されている。[GetCulture('slovak').GetCustom('getPluralDemonym')]を連邦に統合するためには、この地域を#bハンガリー#!から分割し、未解決の[GetCulture('czech').GetNameNoFormatting]-[GetCulture('slovak').GetNameNoFormatting]連合の問題に対する解決策を考案する必要がある。"

je_danubian_federation_polish_button: "[GetCulture('polish').GetName]の懸念に対処する"
je_danubian_federation_polish_button_desc: "#bガリツィア#!地域には、[GetCulture('polish').GetCustom('getPluralDemonym')]と[GetCulture('ukrainian').GetCustom('getPluralDemonym')]の二つの民族が住んでいる。この地域は長い間農業の後進地域として特徴づけられてきたが、二つの民族間の大きな争いの場でもあった。#bガリツィア#!西部は[GetCulture('polish').GetName]が多数派であるが、東部は[GetCulture('ukrainian').GetName]が多数派であり、伝統的に[GetCulture('polish').GetNameNoFormatting]の支配階級が存在する。[GetCulture('polish').GetNameNoFormatting]の土地を統合するためには、#bガリツィア#!を分割するかどうか、そして東部の[GetCulture('polish').GetNameNoFormatting]飛び地をどのように確保するかを決定しなければならない。"

je_danubian_federation_hungarian_button: "[GetCulture('hungarian').GetName]の懸念に対処する"
je_danubian_federation_hungarian_button_desc: "[GetCulture('hungarian').GetName]の人々は長い間、帝国内で高い地位を享受し、歴史的な#b$HUN$#!全体が単一の広大な王冠領として組織されてきた。伝統的な[GetCulture('hungarian').GetNameNoFormatting]の土地には、スラヴ系、ゲルマン系、ルーマニア系の多くの民族が含まれており、それらはすべて民族主義的な[GetCulture('hungarian').GetNameNoFormatting]行政によるマジャル化政策にさらされてきた。#bハンガリー#!を統合するためには、その歴史的な土地を様々な民族の間でどのように分割するか、あるいは少数民族を犠牲にしてそのまま維持するかを決定しなければならない。"

je_danubian_federation_slovene_button: "[GetCulture('slovene').GetName]の懸念に対処する"
je_danubian_federation_slovene_button_desc: "[GetCulture('slovene').GetName]の人々が住む土地は、[ROOT.GetCountry.GetNameNoFlag]の経済的中心地に近く、#b沿海地方#!、#bカルニオラ#!、#bシュタイアーマルク#!の王冠領内にある。一部の[GetCulture('slovene').GetNameNoFormatting]民族主義者は、長い間、南スラヴ統一のより広範な運動と結びついており、[GetCulture('slovene').GetCustom('getPluralDemonym')]、[GetCulture('croat').GetCustom('getPluralDemonym')]、[GetCulture('serb').GetCustom('getPluralDemonym')]の土地を含む自治体を求めてきた。この地域を統合するためには、既存の三つの王冠領から[GetCulture('slovene').GetNameNoFormatting]国家を画定するとともに、統一南スラヴ国家の可能性という問題に答えなければならない。"

je_danubian_federation_croat_button: "[GetCulture('croat').GetName]の懸念に対処する"
je_danubian_federation_croat_button_desc: "[GetCulture('croat').GetName]の土地は長い間分割されてきた――まず#b$STATE_CROATIA$#!、#b$STATE_SLAVONIA$#!、#b$STATE_DALMATIA$#!の三つの王冠領に分かれ、その後#b$AUS_ADJ$#!と#b$HUN_ADJ$#!の行政区画に分割された。[SCOPE.GetRootScope.GetCountry.GetCustom('triune_kingdom_exists_or_not')] さらに、[GetCulture('croat').GetNameNoFormatting]民族主義運動は長い間「イリュリア主義」と結びついており、これは[GetCulture('slovene').GetCustom('getPluralDemonym')]、[GetCulture('croat').GetCustom('getPluralDemonym')]、[GetCulture('serb').GetCustom('getPluralDemonym')]を単一国家の下に統一したいという傾向である。クロアチアを連邦に統合するためには、[SCOPE.GetRootScope.GetCountry.GetCustom('triune_kingdom_exists_or_not_goal')]"
TRIUNE_KINGDOM_NOT_EXISTS: "三つの伝統的な[GetCulture('croat').GetNameNoFormatting]の土地すべてからなる「三重王国」の設立は、[GetCulture('croat').GetNameNoFormatting]民族主義者の長年の目標であった。"
TRIUNE_KINGDOM_EXISTS: "三つの伝統的な[GetCulture('croat').GetNameNoFormatting]の土地すべてからなる「三重王国」が最近設立されたことで、[GetCulture('croat').GetNameNoFormatting]民族主義者は満足し、今では自国の拡大を望んでいる。"
TRIUNE_KINGDOM_NOT_EXISTS_GOAL: "「三重王国」を実現する解決策を考案し、南スラヴ統一の問題について結論を出す。"
TRIUNE_KINGDOM_EXISTS_GOAL: "「三重王国」を維持することを約束し、南スラヴ統一の問題について結論を出す。"

je_danubian_federation_romanian_button: "[GetCulture('romanian').GetName]の懸念に対処する"
je_danubian_federation_romanian_button_desc: "[GetCulture('romanian').GetName]の土地は、非常に多様な地域である#bバナト#!、数多くの[GetCulture('south_german').GetName]飛び地、そして#bセーケイ地方#!という大きな[GetCulture('hungarian').GetName]飛び地を含む、帝国で最も複雑な地域の一つである。[GetCulture('romanian').GetNameNoFormatting]と[GetCulture('hungarian').GetNameNoFormatting]の民族主義者間の領土分割をめぐる激しい争いや、この地域に存在する無数の他の少数民族をめぐる争いが存在する。[SCOPE.GetRootScope.GetCountry.GetCustom('danubian_principalities_exists_or_not')] この地域を連邦に統合するためには、将来の[GetCulture('romanian').GetNameNoFormatting]国家の国境問題を解決し、#bバナト#!とこの地域の[GetCulture('south_german').GetNameNoFormatting]および[GetCulture('hungarian').GetNameNoFormatting]飛び地の地位を明確にしなければならない。"
ROMANIA_EXISTS: "これらの争いに加えて、この地域を他の[GetCulture('romanian').GetNameNoFormatting]国家と統一しようとする動きが存在する。"
ROMANIA_NOT_EXISTS: ""

je_danubian_federation_north_italian_button: "[GetCulture('north_italian').GetName]の懸念に対処する"
je_danubian_federation_north_italian_button_desc: "[GetCulture('north_italian').GetName]の王冠領は長い間、帝国で最も繁栄した地域の一つであり、[ROOT.GetCountry.GetAdjectiveNoFlag]の貿易と航海技術の大半を提供してきた。これらの土地はまた、一貫して手に負えないことが証明されており、イタリア民族主義者は[SCOPE.GetRootScope.GetCountry.GetCustom('italy_or_italian_states')]との統一を強く求めている。[GetCulture('north_italian').GetNameNoFormatting]の土地を連邦に統合するためには、統一主義的感情を鎮圧し、[GetCulture('south_german').GetName]および[GetCulture('slovene').GetName]地域内の[GetCulture('north_italian').GetNameNoFormatting]少数民族の問題を、[GetCulture('north_italian').GetNameNoFormatting]民族主義者に満足のいく形で解決しなければならない。"

ITALY_EXISTS: "#bイタリア#!"
ITALY_NOT_EXISTS: "他のイタリア諸国"

