slave_revolt.4.t: "自国領土にて"
slave_revolt.4.d: "我々の植民地[SCOPE.sState('fleeing_slaves_state').GetName]から逃亡した[GetPopType('slaves').GetName]の一団が、交易船に密航し、無事に[ROOT.GetCountry.GetAdjectiveNoFlag]本国に到達した。法律により、[ROOT.GetCountry.GetAdjectiveNoFormatting]の土を踏んだ全ての奴隷は自由の身となる。"
slave_revolt.4.f: "[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]は埠頭の端に座り、足を水面の上で揺らしていた。夕日が水面を赤く染めていた。今日の知らせを考えれば、ふさわしい色だった。彼はその記事を新聞で、壁に貼られた張り紙で、通りすがりの人々の口の端で目にした。\n\n背後から声がした。[SCOPE.sCharacter('name_a_scope').GetSheHe|U]はそれを聞き覚えていた——裁判所の別の事務員、[SCOPE.sCharacter('name_b_scope').GetFirstNameNoFormatting]だ。\n\n「何を考えているんだ？」\n\n「[SCOPE.sState('port_state').GetPortHubName]では、鎖につながれた人々のことを考えると身を引く。だが、あの水平線の向こうにいる者たちのことは考えもしない。いつか、[SCOPE.GetRootScope.GetCountry.GetCustom('GetDivinity')]が我々全員に罰を下すだろう。」"
slave_revolt.4.a: "彼らは自由民としての全ての権利を有する。"
slave_revolt.4.b: "自由の身であろうとなかろうと、彼らは[SCOPE.sState('fleeing_slaves_state').GetName]に戻らねばならない。"

