austrian_fascism.1.t: "新保守主義者たち"
austrian_fascism.1.d: "[ROOT.GetCountry.GetAdjective]の議会制民主主義への不満に触発され、伝統的階級は[SelectLocalization(SCOPE.sPoliticalMovement('corporatist_movement_scope').IsValid, SCOPE.sPoliticalMovement('corporatist_movement_scope').GetName, 'movement_corporatist')]へと方向転換し始めた。彼らの綱領は、[GetReligion('catholic').GetName]の社会教義と、[GetLawType('law_corporate_state').GetName]の下での労働運動の鎮静化を呼びかけている。"
austrian_fascism.1.f: "「我々はまた、第二のもの、共有する実践的目標によって結ばれている。すなわち、最善を望み、人間共同体をその最も快適な状態へと導くことである。\n\n右に立つ者、左翼社会主義者の行動に破壊以外の何ものも見ない者、ちょうど左に立つ者が右翼の行動に暗黒の災厄しか見ないように——彼らは皆、同じ高貴な努力が彼らを導いているという確信を互いに認めてもよいし、認めねばならない。」\n\n— オトマール・シュパン、#italic 『真の国家』#!" #- Othmar Spann, notable Austrian representative of the Conservative Revolution and later member of the Nazi Party.
austrian_fascism.1.a: "これが保守主義の未来だ。"
austrian_fascism.1.b: "我々は今、最も暗黒の反動に直面している。"

austrian_fascism.2.t: "目覚めたオーストリア"
austrian_fascism.2.d: "[SCOPE.sCharacter('ruler_scope').GetFullName]と[SCOPE.sParty('fascist_party_scope').GetName]の努力により、[ROOT.GetCountry.GetName]は[GetLawType('law_corporate_state').GetName]へと変貌を遂げた。労働運動が沈黙させられ、あるいは取り込まれたことで、ついに社会的平和の感覚が確立された。"
austrian_fascism.2.f: "「労働者階級の最高の願いは、神と国のために働く権利である。それはまさに、共産主義者が最も恐れていることなのだ。」\n\n整った髪の前線募集係が話しながら行ったり来たり歩いていた。[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]は気をつけの姿勢で立ち、クラスメートが両脇にいた。48の目が彼の一挙手一投足を追っていた。\n\n「彼らの武器は破壊工作と分裂であり、彼らは行く先々でそれを撒き散らす。これが君たちが戦うものだ。君たちはこのホールに、クラスのトップに立つ学生として入った。突撃兵としてここを去ることになる。」"
austrian_fascism.2.a: "エスターライヒ！"
austrian_fascism.2.b: "前線の意志が法となる。"

austrian_fascism.3.t: "ただの夢"
austrian_fascism.3.d: "[SelectLocalization(SCOPE.sPoliticalMovement('corporatist_movement_scope').IsValid, SCOPE.sPoliticalMovement('corporatist_movement_scope').GetName, 'movement_corporatist')]は[ROOT.GetCountry.GetName]の支配権掌握に失敗した。急進的民族主義の亡霊は確かに残るだろうが、$gov_corporate_state_austrofascist$のビジョンは歴史の中に消え去った。"
austrian_fascism.3.f: "最近、[ROOT.GetCountry.GetCapital.GetCityHubName]は息をついているように見えた。制服を着た厳しい目をした若者たちは街角から消え、小麦糊で貼られた労働組合のポスターが再び普通の光景となっていた。コーヒーハウスのベランダに座って、[SCOPE.sCharacter('name_a_scope').GetFirstNameNoFormatting]は通り過ぎていく労働者の一団を見渡した。その中心に、見覚えのある顔が一瞬映った。\n\n「[SCOPE.sCharacter('name_b_scope').GetLastNameNoFormatting]さんか？」向かいの席の男が言った。「ちらしで見たような気がする。」\n\n「誰のちらしだ？」\n\n「大したことない奴らだろう。この辺りで最後に見たのはいつだったか覚えていない。」"
austrian_fascism.3.a: "[ROOT.GetCountry.GetNameNoFormatting]は救われた！"
austrian_fascism.3.b: "これから我々はどこへ向かうのか？"

je_standestaat_eliminate_parliament: "議会の廃止"
je_standestaat_eliminate_parliament_desc: "[SelectLocalization(SCOPE.sPoliticalMovement('corporatist_movement_scope').IsValid, SCOPE.sPoliticalMovement('corporatist_movement_scope').GetName, 'movement_corporatist')]は、同情的な大統領と[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]における相当数の議席の両方を確保した。今や[SCOPE.GetRootScope.GetCountry.GetCustom('country_legislature_name')]の廃止を画策し、自らを[ROOT.GetCountry.GetNameNoFormatting]における唯一の合法的な政治主体として確立することができる。"

