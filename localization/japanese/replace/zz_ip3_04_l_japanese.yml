subjecthood_events.5.t: ""
subjecthood_events.5.d: ""
subjecthood_events.5.f: "「まったく不自然だ。罪深いと言おう――罪深く、そして#italic 異国的#!だ。我が祖先は千年にわたりこの地を治めてきた。それなのに、[ROOT.GetCountry.GetCapital.GetCityHubName]のあの干渉者たちは、すべての秩序を覆そうとしている。彼らは私が「#italic 市民#! [SCOPE.sCharacter('name_a_scope').GetLastNameNoFormatting]」として知られることを望んでいるのか？ これがすべての終わりだ」\n\n御者はうなずき、目はしっかりと前方の道に据えていた。次の轍が二人を飲み込むかもしれない。\n\n「私に言わせれば」と領主は続けた。「[ROOT.GetCountry.GetRuler.GetPrimaryRoleTitle]は、あの忌々しい新大臣たちに完全に惑わされている。平民を登用した結果がこれだ！」"
subjecthood_events.5.a: "「幻影に気絶するとは、彼ららしいありがちな反応だ。」"
subjecthood_events.5.b: "「彼らは[SCOPE.sCulture('relevant_primary_culture').GetName]国家の中で筆頭である。」"
subjecthood_events.5.c: "「そう、それらすべては消え去るだろう。」"

