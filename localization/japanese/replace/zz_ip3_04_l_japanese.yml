je_eastern_question_austria: "「ボスニア問題」"
je_eastern_question_austria_reason: "「我々のロビーは、現在[SCOPE.sCountry('bosnia_owner_scope').GetName]の領土である[GetStateRegion('STATE_BOSNIA').GetName]を占領するよう要請してきた。これに応じれば、彼らの提案は[GetStrategicRegion('region_balkans').GetName]における[SelectLocalization(SCOPE.sCountry('relevant_country').IsValid, SCOPE.sCountry('relevant_country').GetAdjectiveNoFlag, 'dyn_c_rsfsr_adj')]の影響力拡大を阻止するのに役立つだろう。\n\n彼らの要請に成功裏に対応すれば、[Concept('concept_political_lobby','$concept_political_lobby_short$')]との良好な関係を得られるが、割り当てられた時間内に実行しなければ、彼らを大いに不愉快にするだろう。」"

eastern_question_austria.1.t: "「前線の移動」"
eastern_question_austria.1.d: "「[SCOPE.sCountry('relevant_country').GetName]がバルカン地域での影響力を拡大しようとする努力は、[SCOPE.sPoliticalLobby('relevant_lobby').GetName]に警戒感を抱かせた。彼らは、[SCOPE.sCountry('relevant_country').GetNameNoFormatting]が[GetStateRegion('STATE_BOSNIA').GetName]に対する影響力を確立するのを防ぐため、[SCOPE.sCountry('bosnia_owner_scope').GetName]に対する先制行動を提案している。」"
eastern_question_austria.1.f: "「提案させてほしい」と[SCOPE.sCharacter('lobby_politician_scope').GetLastNameNoFormatting]は切り出した。\n\n[SCOPE.sCharacter('lobby_politician_scope').GetSheHe|U]は将軍を[ROOT.GetCountry.GetCapital.GetCityHubName]のレストランに追い詰め、30分の時間と引き換えに勘定を払うと約束した。将軍はメニューで最も高価なワインのグラスを置き、うなずいた。\n\n「それは[SCOPE.sCulture('relevant_country_culture').GetCustom('getPluralDemonym')]と、彼らの現在の企てに関するものだ。新聞に目を通し、スラヴ人の不安定な状況と、それに関する[SCOPE.sCountry('relevant_country').GetRuler.GetPrimaryRoleTitle]の攻撃的な言辞についてご存知だろうと存じるが…」"
eastern_question_austria.1.a: "「我々が[GetStateRegion('STATE_BOSNIA').GetNameNoFormatting]を文明化する負担を担おう。」"
eastern_question_austria.1.b: "「この提案は戦争の味がする。」"

eastern_question_austria.2.t: "「占領政府」"
eastern_question_austria.2.d: "「[GetStateRegion('STATE_BOSNIA').GetName]を確保した今、我々はこの地域の将来を決定できる。名目上[SCOPE.sCountry('bosnia_owner_scope').GetAdjective]の権威を維持する占領は、国際的な承認を得られる可能性が高いが、我々の実質的な利益は限られるだろう。」"
eastern_question_austria.2.d_2: "「[GetStateRegion('STATE_BOSNIA').GetName]を確保した今、我々はこの地域の将来を決定できる。名目上この地域の主権を維持する占領は、国際的な承認を得られる可能性が高いが、我々の実質的な利益は限られるだろう。」"
eastern_question_austria.2.f: "「次のように推奨する」と大臣は言った。「初期評価として、[SCOPE.sState('bosnia_state_scope').GetCityHubName]の[SCOPE.sCharacter('name_a_scope').GetLastNameNoFormatting]、[SCOPE.sState('bosnia_state_scope').GetFarmHubName]の[SCOPE.sCharacter('name_b_scope').GetLastNameNoFormatting]、そして[SCOPE.sState('bosnia_state_scope').GetForestryHubName]の[SCOPE.sCharacter('name_c_scope').GetLastNameNoFormatting]だ。各地域の特定の欠陥に基づいて行政タスクフォースを派遣する。」\n\n前列に座っていた[SCOPE.sCharacter('name_b_scope').GetLastNameNoFormatting|U]が手を挙げた。「まだ軍の報告書を受け取っていない。何が予想される？」\n\n「憤慨した住民と、徴税請負に固執する役人たちだ。必要ならば何人でも解任せよ。トルコ人は良政の評判を得たことはない。」"
eastern_question_austria.2.a: "「領土を占領し、その行政を再編成せよ。」"
eastern_question_austria.2.b: "「[GetStateRegion('STATE_BOSNIA').GetName]を我が帝国の不可分の一部として併合せよ。」"
eastern_question_austria.2.c: "「共同財務省の後援の下、[GetStateRegion('STATE_BOSNIA').GetName]を我が帝国に吸収せよ。」"
eastern_question_austria.2.e: "「[GetStateRegion('STATE_BOSNIA').GetName]を[SCOPE.sCountry('croatia_scope').GetName]の一部として併合せよ。」"

