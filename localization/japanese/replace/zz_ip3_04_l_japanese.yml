notification_danubian_federation_culture_pleased_desc: "帝国の連邦化が進む中、[SCOPE.sCountry('austria_scope').GetAdjective]政府は、一部の[SCOPE.sCulture('relevant_culture_scope').GetName]の人々の感謝を集める決定を下した。\n\n我々の[concept_country]内のいくつかの[SCOPE.sCulture('relevant_culture_scope').GetName] [Concept('concept_pop', '$concept_pops$')]がより[concept_loyalist]になった。"
